<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Italy 2026 — R&H</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:61,43,31;
  --terracotta:#C65D3E;--olive:#6B7B3F;--cream:#F5F0E8;--brown:#3D2B1F;--gold:#D4A959;
  --milan:#6B7B8A;--como:#4A8BAD;--florence:#8B6B4A;--pisa:#C65D3E;--rome:#D4A959;
  --card-bg:#FFFFFF;--shadow:0 2px 12px rgba(var(--ink),0.08);
  --radius:12px;--tab-h:64px;
  --text-muted:rgba(var(--ink),0.5);--border-light:rgba(var(--ink),0.06);
}
[data-theme="dark"]{
  --ink:224,214,204;
  --cream:#1a1a2e;--brown:#e0d6cc;--card-bg:#262640;--gold:#e8c170;
  --shadow:0 2px 12px rgba(0,0,0,0.3);--text-muted:rgba(224,214,204,0.5);
  --border-light:rgba(224,214,204,0.08);
  --terracotta:#e07a5f;--olive:#9ab87a;
}
[data-theme="dark"] .tab-bar{border-top-color:rgba(255,255,255,0.06)}
[data-theme="dark"] .app-header{border-bottom-color:rgba(255,255,255,0.06)}
[data-theme="dark"] .tab-btn{color:rgba(224,214,204,0.35)}
[data-theme="dark"] .expense-form input,[data-theme="dark"] .expense-form select,
[data-theme="dark"] .converter-input-group input,[data-theme="dark"] .converter-rate input{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.1);color:var(--brown)}
[data-theme="dark"] .day-pill{border-color:rgba(255,255,255,0.1);background:var(--card-bg)}
[data-theme="dark"] .ac-hero-img{background:rgba(255,255,255,0.04)}
[data-theme="dark"] .ac-thumb{background:rgba(255,255,255,0.04)}
[data-theme="dark"] .city-milan{background:rgba(107,123,138,0.15);color:#9AABB8}
[data-theme="dark"] .city-como{background:rgba(74,139,173,0.15);color:#6BB0D4}
[data-theme="dark"] .city-florence{background:rgba(139,107,74,0.15);color:#C4A47A}
[data-theme="dark"] .city-pisa{background:rgba(198,93,62,0.15);color:#E07A5F}
[data-theme="dark"] .city-rome{background:rgba(212,169,89,0.15);color:#E8C170}
[data-theme="dark"] .quick-sheet{background:#262640;color:var(--brown)}
[data-theme="dark"] .quick-sheet-handle{background:rgba(224,214,204,0.2)}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:'Inter',sans-serif;background:var(--cream);color:var(--brown);
  max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;
  padding-bottom:calc(var(--tab-h) + 60px);overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Playfair Display',serif;font-weight:600;line-height:1.25}
h1{font-size:1.5rem}h2{font-size:1.25rem}h3{font-size:1.1rem}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* Header */
.app-header{
  padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(var(--ink),0.06);background:var(--cream);
  position:sticky;top:0;z-index:100;
}
.app-header h1{font-size:1.1rem;letter-spacing:0.02em}
.app-header .subtitle{font-size:0.7rem;color:var(--olive);font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-top:2px}
.header-date{font-size:0.75rem;color:var(--terracotta);font-weight:500;text-align:right}
.header-date .tz{font-size:0.65rem;color:rgba(var(--ink),0.4);display:block;margin-top:1px}

/* Bottom Tabs */
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:var(--tab-h);
  background:var(--card-bg);border-top:1px solid rgba(var(--ink),0.08);
  display:flex;align-items:center;justify-content:space-around;
  z-index:200;padding-bottom:env(safe-area-inset-bottom,0);
}
.tab-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;padding:6px 12px;cursor:pointer;
  color:rgba(var(--ink),0.35);transition:color 0.2s;min-width:56px;
  -webkit-tap-highlight-color:transparent;
}
.tab-btn svg{width:22px;height:22px;transition:transform 0.15s}
.tab-btn span{font-size:0.6rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
.tab-btn.active{color:var(--terracotta)}
.tab-btn.active svg{transform:scale(1.1)}

/* Panels */
.panel{display:none;padding:16px 20px 20px;animation:fadeIn 0.2s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* City badge */
.city-badge{
  display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 8px;
  border-radius:20px;font-size:0.65rem;font-weight:600;letter-spacing:0.06em;
  text-transform:uppercase;
}
.city-badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.city-milan{background:rgba(107,123,138,0.1);color:#6B7B8A}.city-milan::before{background:#6B7B8A}
.city-como{background:rgba(74,139,173,0.1);color:#4A8BAD}.city-como::before{background:#4A8BAD}
.city-florence{background:rgba(139,107,74,0.1);color:#8B6B4A}.city-florence::before{background:#8B6B4A}
.city-pisa{background:rgba(198,93,62,0.1);color:#C65D3E}.city-pisa::before{background:#C65D3E}
.city-rome{background:rgba(212,169,89,0.12);color:#B8923A}.city-rome::before{background:#D4A959}

/* Day card */
.day-selector{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.day-selector::-webkit-scrollbar{display:none}
.day-pill{
  flex-shrink:0;padding:8px 14px;border-radius:20px;border:1.5px solid rgba(var(--ink),0.1);
  background:var(--card-bg);cursor:pointer;text-align:center;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;min-width:60px;
}
.day-pill .dnum{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;line-height:1.2}
.day-pill .dname{font-size:0.55rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:rgba(var(--ink),0.4);margin-top:1px}
.day-pill.active{border-color:var(--terracotta);background:var(--terracotta);color:#fff}
.day-pill.active .dname{color:rgba(255,255,255,0.8)}
.day-pill.today-ring{box-shadow:0 0 0 2px var(--terracotta)}

/* Activity Card */
.activity-card{
  background:var(--card-bg);border-radius:var(--radius);padding:14px 16px;
  margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;
  transition:box-shadow 0.2s;position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.activity-card:active{box-shadow:0 1px 4px rgba(var(--ink),0.12)}
.activity-card.now{border-left:3px solid var(--terracotta)}
.activity-card.past{opacity:0.5}
.ac-time{font-size:0.7rem;font-weight:600;color:var(--terracotta);letter-spacing:0.02em;margin-bottom:3px}
.ac-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;line-height:1.3}
.ac-subtitle{font-size:0.75rem;color:rgba(var(--ink),0.5);margin-top:3px;line-height:1.4}
.ac-expand{display:none;margin-top:12px;padding-top:12px;border-top:1px solid rgba(var(--ink),0.06)}
.activity-card.open .ac-expand{display:block}
.ac-expand-section{margin-bottom:10px}
.ac-expand-label{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--olive);margin-bottom:4px;display:flex;align-items:center;gap:5px}
.ac-expand-label svg{width:12px;height:12px;color:var(--olive)}
.ac-expand-text{font-size:0.8rem;line-height:1.6;color:rgba(var(--ink),0.7)}
.ac-tip{
  background:rgba(198,93,62,0.06);border-radius:8px;padding:8px 10px;
  font-size:0.75rem;line-height:1.5;color:var(--terracotta);margin-top:8px;
}
.ac-food{
  background:rgba(107,123,63,0.06);border-radius:8px;padding:8px 10px;
  font-size:0.75rem;line-height:1.5;color:var(--olive);margin-top:6px;
}
.ac-chevron{
  position:absolute;top:14px;right:14px;width:16px;height:16px;
  color:rgba(var(--ink),0.2);transition:transform 0.2s;
}
.activity-card.open .ac-chevron{transform:rotate(180deg)}

/* Progress bar */
.day-progress{height:3px;background:rgba(var(--ink),0.08);border-radius:2px;margin:0 0 12px;overflow:hidden}
.day-progress-fill{height:100%;background:var(--terracotta);border-radius:2px;transition:width 0.5s}
/* Countdown badge */
.next-up-label .cd{font-weight:400;opacity:0.8}

/* Day header */
.day-header{margin-bottom:16px}
.day-header h2{margin-bottom:4px}
.day-header .route{font-size:0.8rem;color:rgba(var(--ink),0.5);font-style:italic;font-family:'Playfair Display',serif}

/* Hotel card */
.hotel-card{
  background:linear-gradient(135deg,rgba(212,169,89,0.08),rgba(212,169,89,0.02));
  border:1px solid rgba(212,169,89,0.2);border-radius:var(--radius);padding:12px 14px;
  margin-bottom:14px;
}
.hotel-card .label{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.hotel-card .name{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:600}
.hotel-card .addr{font-size:0.75rem;color:rgba(var(--ink),0.5);margin-top:2px}

/* Warning card */
.warn-card{
  background:rgba(198,93,62,0.06);border:1px solid rgba(198,93,62,0.15);
  border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;
  font-size:0.8rem;line-height:1.5;color:var(--terracotta);
}
.warn-card strong{font-weight:600}

/* Map panel */
#map-container{height:calc(100vh - 140px);height:calc(100dvh - 140px);border-radius:var(--radius);overflow:hidden;margin-top:8px}
.map-day-tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 0;scrollbar-width:none}
.map-day-tabs::-webkit-scrollbar{display:none}
.map-day-tab{
  flex-shrink:0;padding:6px 12px;border-radius:16px;border:1px solid rgba(var(--ink),0.1);
  background:var(--card-bg);font-size:0.7rem;font-weight:600;cursor:pointer;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent;
}
.map-day-tab.active{background:var(--terracotta);color:#fff;border-color:var(--terracotta)}

/* Expense panel */
.expense-form{
  background:var(--card-bg);border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);margin-bottom:16px;
}
.expense-form label{font-size:0.7rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:rgba(var(--ink),0.5);display:block;margin-bottom:4px;margin-top:10px}
.expense-form label:first-child{margin-top:0}
.expense-form input,.expense-form select{
  width:100%;padding:10px 12px;border:1.5px solid rgba(var(--ink),0.1);border-radius:8px;
  font-family:'Inter',sans-serif;font-size:0.9rem;background:var(--cream);
  color:var(--brown);outline:none;transition:border-color 0.2s;
  -webkit-appearance:none;
}
.expense-form input:focus,.expense-form select:focus{border-color:var(--terracotta)}
.expense-row{display:flex;gap:10px}
.expense-row>div{flex:1}
.btn-primary{
  width:100%;padding:12px;border:none;border-radius:8px;
  background:var(--terracotta);color:#fff;font-family:'Inter',sans-serif;
  font-size:0.85rem;font-weight:600;cursor:pointer;margin-top:14px;
  transition:background 0.2s;-webkit-tap-highlight-color:transparent;
}
.btn-primary:active{background:#B04E30}
.btn-secondary{
  width:100%;padding:10px;border:1.5px solid rgba(var(--ink),0.12);border-radius:8px;
  background:transparent;color:var(--brown);font-family:'Inter',sans-serif;
  font-size:0.8rem;font-weight:500;cursor:pointer;margin-top:8px;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent;
}
.btn-secondary:active{background:rgba(var(--ink),0.04)}
.camera-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px;border:1.5px dashed rgba(var(--ink),0.15);border-radius:8px;
  background:transparent;width:100%;cursor:pointer;color:rgba(var(--ink),0.4);
  font-size:0.8rem;font-weight:500;margin-top:10px;transition:all 0.2s;
  font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;
}
.camera-btn svg{width:18px;height:18px}
.camera-btn:active{background:rgba(var(--ink),0.03)}
.camera-btn.has-photo{border-color:var(--olive);color:var(--olive);border-style:solid}

/* Expense list */
.expense-summary{
  display:flex;gap:12px;margin-bottom:16px;
}
.expense-stat{
  flex:1;background:var(--card-bg);border-radius:var(--radius);padding:14px;
  box-shadow:var(--shadow);text-align:center;
}
.expense-stat .val{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--terracotta)}
.expense-stat .lbl{font-size:0.6rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:rgba(var(--ink),0.4);margin-top:2px}
.expense-item{
  background:var(--card-bg);border-radius:10px;padding:12px 14px;
  margin-bottom:6px;box-shadow:0 1px 4px rgba(var(--ink),0.05);
  display:flex;align-items:center;justify-content:space-between;
}
.expense-item .ei-left{flex:1}
.expense-item .ei-cat{font-size:0.6rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--olive)}
.expense-item .ei-note{font-size:0.8rem;margin-top:2px}
.expense-item .ei-amount{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--terracotta)}
.expense-item .ei-hkd{font-size:0.65rem;color:rgba(var(--ink),0.4);text-align:right}
.expense-day-label{font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(var(--ink),0.3);margin:14px 0 6px;padding-top:8px;border-top:1px solid rgba(var(--ink),0.06)}
.expense-day-label:first-child{margin-top:0;padding-top:0;border-top:none}
.expense-delete{
  background:none;border:none;color:rgba(var(--ink),0.2);cursor:pointer;
  padding:4px 0 4px 10px;font-size:1.1rem;-webkit-tap-highlight-color:transparent;
}

/* More panel */
.more-section{margin-bottom:20px}
.more-section h2{font-size:1.1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.more-section h2 svg{width:20px;height:20px;color:var(--terracotta)}

/* Converter */
.converter-box{
  background:var(--card-bg);border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);
}
.converter-input-group{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.converter-input-group .curr{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;width:44px;flex-shrink:0}
.converter-input-group input{
  flex:1;padding:10px 12px;border:1.5px solid rgba(var(--ink),0.1);border-radius:8px;
  font-family:'Inter',sans-serif;font-size:1rem;background:var(--cream);
  color:var(--brown);outline:none;text-align:right;
}
.converter-input-group input:focus{border-color:var(--terracotta)}
.converter-swap{
  display:flex;align-items:center;justify-content:center;margin:6px 0;
  color:rgba(var(--ink),0.2);
}
.converter-swap svg{width:20px;height:20px}
.quick-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.quick-btn{
  padding:6px 12px;border-radius:16px;border:1px solid rgba(var(--ink),0.1);
  background:var(--card-bg);font-size:0.75rem;font-weight:500;cursor:pointer;
  transition:all 0.15s;-webkit-tap-highlight-color:transparent;
  font-family:'Inter',sans-serif;
}
.quick-btn:active{background:var(--terracotta);color:#fff;border-color:var(--terracotta)}
.converter-rate{
  margin-top:10px;padding-top:10px;border-top:1px solid rgba(var(--ink),0.06);
  display:flex;align-items:center;justify-content:space-between;
}
.converter-rate label{font-size:0.7rem;color:rgba(var(--ink),0.4);font-weight:500}
.converter-rate input{
  width:70px;padding:6px 8px;border:1px solid rgba(var(--ink),0.1);border-radius:6px;
  font-family:'Inter',sans-serif;font-size:0.8rem;text-align:center;
  background:var(--cream);outline:none;
}

/* Phrasebook */
.phrase-group{margin-bottom:14px}
.phrase-group-title{
  font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--olive);margin-bottom:8px;padding-bottom:4px;
  border-bottom:1px solid rgba(107,123,63,0.15);
}
.phrase-item{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:7px 0;border-bottom:1px solid rgba(var(--ink),0.04);
}
.phrase-it{font-weight:600;font-size:0.85rem}
.phrase-pro{font-size:0.7rem;color:rgba(var(--ink),0.35);font-style:italic;margin-left:6px}
.phrase-zh{font-size:0.8rem;color:rgba(var(--ink),0.5);flex-shrink:0;margin-left:8px}

/* Checklist */
.checklist-group{margin-bottom:14px}
.checklist-group-title{
  font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--terracotta);margin-bottom:6px;
}
.check-item{
  display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid rgba(var(--ink),0.04);cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.check-box{
  width:20px;height:20px;border-radius:5px;border:1.5px solid rgba(var(--ink),0.2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.check-item.done .check-box{background:var(--olive);border-color:var(--olive)}
.check-item.done .check-box svg{display:block}
.check-box svg{display:none;width:12px;height:12px;color:#fff}
.check-item.done .check-label{text-decoration:line-through;opacity:0.4}
.check-label{font-size:0.85rem}
.checklist-progress{font-size:0.75rem;color:rgba(var(--ink),0.4);margin-bottom:12px}

/* Emergency */
.emergency-card{
  background:var(--card-bg);border-radius:var(--radius);padding:14px 16px;
  box-shadow:var(--shadow);margin-bottom:8px;
}
.emergency-card .em-label{font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(var(--ink),0.3);margin-bottom:6px}
.emergency-card a{
  display:flex;align-items:center;gap:8px;padding:6px 0;
  color:var(--terracotta);text-decoration:none;font-weight:600;font-size:0.9rem;
}
.emergency-card a svg{width:16px;height:16px;flex-shrink:0}
.emergency-card .em-note{font-size:0.75rem;color:rgba(var(--ink),0.5);margin-top:4px;line-height:1.4}

/* Leaflet overrides */
.leaflet-popup-content-wrapper{border-radius:10px;font-family:'Inter',sans-serif;font-size:0.8rem;box-shadow:0 4px 16px rgba(var(--ink),0.15)}
.leaflet-popup-content{margin:10px 14px;line-height:1.5}
.leaflet-popup-content b{font-family:'Playfair Display',serif;font-weight:600}
.map-legend{
  background:var(--card-bg);border-radius:8px;padding:8px 10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);font-size:0.65rem;line-height:1.8;
}
.map-legend-item{display:flex;align-items:center;gap:5px}
.map-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Today panel specifics */
.today-hero{
  text-align:center;padding:20px 0 16px;
}
.today-hero .day-num{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;line-height:1;color:var(--terracotta)}
.today-hero .day-name{font-size:0.75rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(var(--ink),0.4);margin-top:4px}
.today-hero .day-route{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:rgba(var(--ink),0.6);margin-top:6px}
.now-label{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--terracotta);color:#fff;font-size:0.6rem;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:10px;
  margin-bottom:8px;
}
.now-label::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.next-up-label{
  font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--olive);margin-bottom:8px;
}

/* No trip overlay */
.no-trip-msg{text-align:center;padding:40px 20px;color:rgba(var(--ink),0.4)}
.no-trip-msg h2{color:var(--brown);margin-bottom:8px}
.no-trip-msg p{font-size:0.85rem;line-height:1.5}
.countdown{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:700;color:var(--terracotta);margin:16px 0 8px}

/* V2: Address + Navigate */
.ac-addr{font-size:0.72rem;color:rgba(var(--ink),0.45);margin-top:2px}
.ac-nav{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;background:var(--terracotta);color:#fff;font-size:0.6rem;font-weight:600;text-decoration:none;margin-left:6px;vertical-align:middle;letter-spacing:0.02em}
.ac-nav svg{width:10px;height:10px}
.ac-nav:active{background:#B04E30}

/* V2: Open/Closed badge */
.ac-status{display:inline-flex;align-items:center;gap:3px;font-size:0.6rem;font-weight:700;letter-spacing:0.04em;padding:2px 7px;border-radius:8px;margin-left:6px;vertical-align:middle}
.ac-status.open-now{background:rgba(107,123,63,0.12);color:var(--olive)}
.ac-status.closed-now{background:rgba(198,93,62,0.1);color:var(--terracotta)}

/* V2: Practical info grid */
.ac-prac{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:0.75rem;margin-top:8px;padding:10px 12px;background:rgba(var(--ink),0.02);border-radius:8px;border:1px solid rgba(var(--ink),0.04)}
.ac-prac-label{font-weight:600;color:rgba(var(--ink),0.45);white-space:nowrap}
.ac-prac-val{color:var(--brown);line-height:1.5}

/* V2: Food mini-cards */
.ac-food-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.ac-food-item{background:rgba(107,123,63,0.05);border-radius:8px;padding:8px 10px}
.ac-food-name{font-weight:600;font-size:0.8rem;color:var(--olive);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.ac-food-addr{font-size:0.68rem;color:rgba(var(--ink),0.4);margin-top:1px}
.ac-food-desc{font-size:0.75rem;color:rgba(var(--ink),0.6);margin-top:2px;line-height:1.45}

/* V2: Getting Here */
.ac-here{font-size:0.75rem;color:rgba(var(--ink),0.6);margin-top:8px;padding:8px 10px;background:rgba(74,139,173,0.06);border-radius:8px;line-height:1.5}
.ac-here-label{font-weight:700;color:#4A8BAD;margin-bottom:2px;font-size:0.6rem;letter-spacing:0.08em;text-transform:uppercase}

/* V2: Next stop */
.ac-next{font-size:0.72rem;color:rgba(var(--ink),0.45);margin-top:10px;padding-top:10px;border-top:1px dashed rgba(var(--ink),0.08);display:flex;align-items:center;gap:4px}
.ac-next svg{width:12px;height:12px;color:var(--terracotta);flex-shrink:0}

/* V2: Culture card */
.culture-card{background:linear-gradient(135deg,rgba(198,93,62,0.06),rgba(198,93,62,0.02));border:1px solid rgba(198,93,62,0.12);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.culture-card h3{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:600;margin-bottom:8px;color:var(--terracotta)}
.culture-card ul{list-style:none;padding:0}
.culture-card li{font-size:0.78rem;line-height:1.55;color:rgba(var(--ink),0.7);margin-bottom:6px;padding-left:14px;position:relative}
.culture-card li::before{content:'\2022';position:absolute;left:0;color:var(--terracotta)}

/* V2: Booking card */
.booking-card{background:var(--card-bg);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.booking-card .bk-left{flex:1;min-width:0}
.booking-card .bk-title{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:600}
.booking-card .bk-detail{font-size:0.72rem;color:rgba(var(--ink),0.5);margin-top:2px}
.booking-card .bk-ref{font-family:'SF Mono','Menlo',monospace;font-size:0.72rem;color:var(--terracotta);font-weight:700;cursor:pointer;text-align:right;flex-shrink:0;padding:4px 8px;background:rgba(198,93,62,0.06);border-radius:6px}

/* V2: Amenity list */
.amenity-list{font-size:0.78rem;line-height:1.8;color:rgba(var(--ink),0.6);padding:4px 0}
.amenity-list strong{color:var(--brown);font-weight:600}

/* V3: Card hero image */
.ac-hero-img{width:calc(100% + 32px);margin:-14px -16px 12px;height:200px;object-fit:cover;border-radius:var(--radius) var(--radius) 0 0;display:block;background:rgba(var(--ink),0.04)}
.ac-hero-img.loading{background:linear-gradient(90deg,rgba(var(--ink),0.04) 25%,rgba(var(--ink),0.08) 50%,rgba(var(--ink),0.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* V3: Collapsed card thumbnail */
.ac-thumb{width:40px;height:40px;border-radius:8px;object-fit:cover;float:right;margin-left:10px;margin-top:2px;background:rgba(var(--ink),0.04)}

/* V3: Highlights box */
.ac-highlights{background:linear-gradient(135deg,rgba(198,93,62,0.06),rgba(212,169,89,0.06));border:1px solid rgba(198,93,62,0.12);border-radius:8px;padding:10px 12px;margin-top:8px}
.ac-highlights-title{font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--terracotta);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.ac-highlights ul{list-style:none;padding:0;margin:0}
.ac-highlights li{font-size:0.78rem;line-height:1.55;color:rgba(var(--ink),0.7);padding-left:16px;position:relative;margin-bottom:4px}
.ac-highlights li::before{content:'\2605';position:absolute;left:0;color:var(--gold);font-size:0.65rem}

/* V3: titleEn subtitle */
.ac-title-en{font-size:0.68rem;color:rgba(var(--ink),0.35);font-weight:400;font-family:'Inter',sans-serif;margin-top:1px}

/* V4: Copy toast */
.copy-toast{
  position:fixed;bottom:calc(var(--tab-h) + 70px);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--brown);color:var(--cream);padding:8px 16px;border-radius:20px;
  font-size:0.75rem;font-weight:600;z-index:500;opacity:0;
  transition:opacity 0.25s,transform 0.25s;pointer-events:none;
}
.copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* V4: Tap-to-copy address */
.ac-addr.copyable{cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background 0.15s;border-radius:4px;padding:1px 4px;margin:-1px -4px}
.ac-addr.copyable:active{background:rgba(198,93,62,0.1)}
.hotel-card .addr.copyable{cursor:pointer;transition:background 0.15s;border-radius:4px;padding:1px 4px;margin:-1px -4px}
.hotel-card .addr.copyable:active{background:rgba(212,169,89,0.15)}

/* V4: Booking reminder */
.booking-reminder{
  background:linear-gradient(135deg,rgba(212,169,89,0.1),rgba(212,169,89,0.04));
  border-left:3px solid var(--gold);border-radius:var(--radius);
  padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;
}
.booking-reminder .br-icon{font-size:1.2rem;flex-shrink:0}
.booking-reminder .br-info{flex:1}
.booking-reminder .br-name{font-family:'Playfair Display',serif;font-size:0.85rem;font-weight:600}
.booking-reminder .br-time{font-size:0.7rem;color:var(--gold);font-weight:600;margin-top:2px}

/* V4: Quick actions bar */
.quick-bar{
  position:fixed;bottom:calc(var(--tab-h) + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:150;
  display:flex;gap:6px;padding:8px 16px;
  background:linear-gradient(to top,var(--cream) 80%,transparent);
  pointer-events:none;
}
.quick-bar.hidden{display:none}
.quick-pill{
  pointer-events:auto;flex:1;display:flex;align-items:center;justify-content:center;gap:4px;
  padding:8px 6px;border-radius:20px;background:var(--card-bg);
  box-shadow:0 2px 8px rgba(0,0,0,0.1);border:1px solid rgba(var(--ink),0.06);
  font-size:0.65rem;font-weight:600;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:transform 0.15s;
}
.quick-pill:active{transform:scale(0.95)}
.quick-pill .qp-icon{font-size:0.9rem}

/* V4: Quick sheet */
.quick-sheet-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;
  opacity:0;pointer-events:none;transition:opacity 0.25s;
}
.quick-sheet-overlay.open{opacity:1;pointer-events:auto}
.quick-sheet{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:430px;background:var(--card-bg);
  border-radius:16px 16px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));
  z-index:301;transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height:70vh;overflow-y:auto;
}
.quick-sheet-overlay.open .quick-sheet{transform:translateX(-50%) translateY(0)}
.quick-sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(var(--ink),0.15);margin:0 auto 16px}
.quick-sheet h3{font-size:1rem;margin-bottom:12px}

/* V4: Weather badge */
.weather-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:0.75rem;font-weight:600;color:var(--brown);
  background:var(--card-bg);border-radius:16px;padding:4px 10px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.weather-badge .wb-icon{font-size:1rem}
.weather-badge .wb-temp{font-family:'Playfair Display',serif;font-size:0.85rem}

/* V4: Dark mode toggle */
.theme-toggle{
  background:none;border:none;cursor:pointer;padding:6px;
  color:var(--brown);opacity:0.5;transition:opacity 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.theme-toggle:hover{opacity:0.8}
.theme-toggle svg{width:18px;height:18px}

/* V4: Day swipe transition */
#dayContent{transition:opacity 0.15s,transform 0.15s}
#dayContent.swipe-left{opacity:0;transform:translateX(-30px)}
#dayContent.swipe-right{opacity:0;transform:translateX(30px)}

/* V4: Discovery spots */
.discovery-section{margin-top:20px;padding-top:16px;border-top:1px dashed rgba(var(--ink),0.1)}
.discovery-title{font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--olive);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.discovery-card{
  background:var(--card-bg);border-radius:var(--radius);padding:10px 14px;
  box-shadow:var(--shadow);margin-bottom:8px;display:flex;align-items:center;gap:10px;
}
.discovery-card .dc-icon{font-size:1.2rem;flex-shrink:0}
.discovery-card .dc-info{flex:1;min-width:0}
.discovery-card .dc-name{font-weight:600;font-size:0.85rem}
.discovery-card .dc-type{font-size:0.6rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--olive);margin-left:4px}
.discovery-card .dc-desc{font-size:0.72rem;color:var(--text-muted);margin-top:2px;line-height:1.4}
.discovery-card .dc-go{flex-shrink:0}
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div>
    <h1>Italy 2026</h1>
    <div class="subtitle">Ronald & Hazel</div>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <div id="headerWeather"></div>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
    <div class="header-date" id="headerDate"></div>
  </div>
</header>

<!-- Panels -->
<main>
  <!-- TODAY -->
  <div class="panel" id="panelToday"></div>

  <!-- DAYS -->
  <div class="panel" id="panelDays">
    <div class="day-selector" id="daySelector"></div>
    <div id="dayContent"></div>
  </div>

  <!-- MAP -->
  <div class="panel" id="panelMap">
    <div class="map-day-tabs" id="mapDayTabs"></div>
    <div id="map-container"></div>
  </div>

  <!-- EXPENSES -->
  <div class="panel" id="panelExpenses">
    <h2 style="margin-bottom:14px">Expenses</h2>
    <div class="expense-summary" id="expenseSummary"></div>
    <div class="expense-form">
      <label>Amount (EUR)</label>
      <input type="number" id="expAmount" placeholder="0.00" step="0.01" inputmode="decimal">
      <div class="expense-row">
        <div>
          <label>Category</label>
          <select id="expCategory">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Tickets">Tickets</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div>
          <label>Day</label>
          <select id="expDay"></select>
        </div>
      </div>
      <label>Note</label>
      <input type="text" id="expNote" placeholder="What was it for?">
      <button class="camera-btn" id="cameraBtn" onclick="document.getElementById('cameraInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span id="cameraBtnText">Add photo</span>
      </button>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">
      <button class="btn-primary" onclick="addExpense()">Add Expense</button>
    </div>
    <div id="expenseList"></div>
    <button class="btn-secondary" onclick="exportCSV()" id="exportBtn" style="display:none">Export CSV</button>
  </div>

  <!-- MORE -->
  <div class="panel" id="panelMore">
    <!-- Bookings -->
    <div class="more-section">
      <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        \u9810\u8a02\u78ba\u8a8d
      </h2>
      <div id="bookingsList"></div>
    </div>

    <!-- Culture Tips -->
    <div class="more-section">
      <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        \u6587\u5316\u8cbc\u58eb
      </h2>
      <div id="cultureTips"></div>
    </div>

    <!-- Converter -->
    <div class="more-section">
      <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
        EUR / HKD
      </h2>
      <div class="converter-box">
        <div class="converter-input-group">
          <span class="curr">EUR</span>
          <input type="number" id="convEur" placeholder="0" inputmode="decimal" oninput="convertEur()">
        </div>
        <div class="converter-swap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 16 3 12 7 8"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
        </div>
        <div class="converter-input-group">
          <span class="curr">HKD</span>
          <input type="number" id="convHkd" placeholder="0" inputmode="decimal" oninput="convertHkd()">
        </div>
        <div class="quick-btns">
          <button class="quick-btn" onclick="quickConvert(5)">5</button>
          <button class="quick-btn" onclick="quickConvert(10)">10</button>
          <button class="quick-btn" onclick="quickConvert(20)">20</button>
          <button class="quick-btn" onclick="quickConvert(50)">50</button>
          <button class="quick-btn" onclick="quickConvert(100)">100</button>
        </div>
        <div class="converter-rate">
          <label>1 EUR =</label>
          <input type="number" id="convRate" value="8.5" step="0.01" inputmode="decimal" onchange="saveRate()">
          <label>HKD</label>
        </div>
      </div>
    </div>

    <!-- Phrasebook -->
    <div class="more-section">
      <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Italian Phrasebook
      </h2>
      <div id="phrasebook"></div>
    </div>

    <!-- Packing -->
    <div class="more-section">
      <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7h-4V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v3H4a2 2 0 00-2 2v11a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M10 4h4v3h-4z"/></svg>
        Packing Checklist
      </h2>
      <div class="checklist-progress" id="checkProgress"></div>
      <div id="checklist"></div>
    </div>

    <!-- Nearby Amenities -->
    <div class="more-section">
      <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Nearby Amenities
      </h2>
      <div id="amenitiesList"></div>
    </div>

    <!-- Emergency -->
    <div class="more-section">
      <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
        Emergency
      </h2>
      <div id="emergencyInfo"></div>
    </div>
  </div>
</main>

<!-- Copy Toast -->
<div class="copy-toast" id="copyToast">已複製地址</div>

<!-- Quick Actions Bar -->
<div class="quick-bar" id="quickBar">
  <div class="quick-pill" onclick="openSheet('phrases')"><span class="qp-icon">🈯</span>翻譯</div>
  <div class="quick-pill" onclick="openSheet('currency')"><span class="qp-icon">💱</span>匯率</div>
  <div class="quick-pill" onclick="openSheet('hotel')"><span class="qp-icon">🏨</span>酒店</div>
  <div class="quick-pill" onclick="openSheet('emergency')"><span class="qp-icon">🆘</span>緊急</div>
</div>

<!-- Quick Sheet Overlay -->
<div class="quick-sheet-overlay" id="quickSheetOverlay" onclick="closeSheet()">
  <div class="quick-sheet" id="quickSheet" onclick="event.stopPropagation()">
    <div class="quick-sheet-handle"></div>
    <div id="quickSheetContent"></div>
  </div>
</div>

<!-- Tab Bar -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="panelToday" onclick="switchTab('panelToday',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>今日</span>
  </button>
  <button class="tab-btn" data-tab="panelDays" onclick="switchTab('panelDays',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>行程</span>
  </button>
  <button class="tab-btn" data-tab="panelMap" onclick="switchTab('panelMap',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
    <span>地圖</span>
  </button>
  <button class="tab-btn" data-tab="panelExpenses" onclick="switchTab('panelExpenses',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    <span>記帳</span>
  </button>
  <button class="tab-btn" data-tab="panelMore" onclick="switchTab('panelMore',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    <span>更多</span>
  </button>
</nav>

<script>
// ============================================================

// ============================================================

function italyNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: TZ }));
}

function italyDateStr() {
  const d = italyNow();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getTripDayIndex() {
  const today = italyDateStr();
  return DAYS.findIndex(d => d.date === today);
}

function parseTime(timeStr, dateStr) {
  const [h, m] = timeStr.split(':').map(Number);
  const [y, mo, da] = dateStr.split('-').map(Number);
  return new Date(y, mo - 1, da, h, m);
}

function cityClass(city) {
  return 'city-' + city;
}

function getDayProgress(day) {
  var now = italyNow(), today = italyDateStr();
  if (day.date !== today) return day.date < today ? 100 : 0;
  var acts = day.activities;
  if (!acts.length) return 0;
  var start = parseTime(acts[0].time, day.date);
  var lastAct = acts[acts.length - 1];
  var end = lastAct.end ? parseTime(lastAct.end, day.date) : parseTime(lastAct.time, day.date);
  if (now <= start) return 0;
  if (now >= end) return 100;
  return Math.round((now - start) / (end - start) * 100);
}

function formatCountdown(ms) {
  if (ms <= 0) return null;
  var mins = Math.floor(ms / 60000);
  if (mins < 60) return mins + ' \u5206\u9418';
  var h = Math.floor(mins / 60), m = mins % 60;
  return h + ' \u5c0f\u6642' + (m > 0 ? ' ' + m + ' \u5206\u9418' : '');
}

function getRate() {
  const stored = localStorage.getItem('italy_rate');
  return stored ? parseFloat(stored) : DEFAULT_RATE;
}

function saveRate() {
  const v = parseFloat(document.getElementById('convRate').value);
  if (v > 0) localStorage.setItem('italy_rate', v);
}

function chevronSVG() {
  return '<svg class="ac-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';

function navSVG() {

}

function getOpenBadge(hrsStr) {
  try {
    const now = italyNow();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    const match = hrsStr.match(/(\d{1,2}):(\d{2})\s*[\u2013\-]\s*(\d{1,2}):(\d{2})/);
    if (!match) return '';
    const openMin = parseInt(match[1]) * 60 + parseInt(match[2]);
    const closeMin = parseInt(match[3]) * 60 + parseInt(match[4]);
    const isOpen = nowMin >= openMin && nowMin < closeMin;
    return ' <span class="ac-status ' + (isOpen ? 'open-now' : 'closed-now') + '">' + (isOpen ? '\u958b\u653e\u4e2d' : '\u5df2\u95dc') + '</span>';
  } catch(e) { return ''; }
}

// ============================================================
function copyAddr(el) {
  var text = el.getAttribute('data-addr') || el.textContent.replace(/\s*Go$/, '').trim();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
  var toast = document.getElementById('copyToast');
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 800);
}

  45: '\uD83C\uDF2B\uFE0F', 48: '\uD83C\uDF2B\uFE0F',
  51: '\uD83C\uDF26', 53: '\uD83C\uDF26', 55: '\uD83C\uDF27',
  61: '\uD83C\uDF27', 63: '\uD83C\uDF27\uFE0F', 65: '\uD83C\uDF27\uFE0F',
  71: '\u2744\uFE0F', 73: '\u2744\uFE0F', 75: '\u2744\uFE0F',
  80: '\uD83C\uDF26', 81: '\uD83C\uDF27', 82: '\uD83C\uDF27\uFE0F',
  95: '\u26C8\uFE0F', 96: '\u26C8\uFE0F', 99: '\u26C8\uFE0F'
};

function getWeatherIcon(code) {
  return WEATHER_ICONS[code] || '\u2600\uFE0F';
}

function fetchWeather(city, callback) {
  var coords = HOTELS[city];
  if (!coords) return;
  var key = 'italy_weather_' + city;
  var cached = weatherCache[city];
  if (cached && (Date.now() - cached.ts < 1800000)) {
    callback(cached.data);
    return;
  }
  var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + coords.lat + '&longitude=' + coords.lng + '&current=temperature_2m,weathercode&timezone=Europe/Rome';
  fetch(url).then(function(r) { return r.json(); }).then(function(data) {
    if (data.current) {
      var result = { temp: Math.round(data.current.temperature_2m), code: data.current.weathercode };
      weatherCache[city] = { data: result, ts: Date.now() };
      callback(result);
    }
  }).catch(function() {});
}

function renderHeaderWeather() {
  var dayIdx = getTripDayIndex();
  if (dayIdx === -1) return;
  var city = DAYS[dayIdx].city;
  var hotelCity = city === 'como' ? 'milan' : city === 'pisa' ? 'florence' : city;
  fetchWeather(hotelCity, function(w) {
    document.getElementById('headerWeather').innerHTML = '<div class="weather-badge"><span class="wb-icon">' + getWeatherIcon(w.code) + '</span><span class="wb-temp">' + w.temp + '\u00B0</span></div>';
  });
}

function qsConvert(from) {
  var rate = getRate();
  if (from === 'eur') {
    var v = parseFloat(document.getElementById('qsEur').value) || 0;

  } else {
    var v = parseFloat(document.getElementById('qsHkd').value) || 0;
    document.getElementById('qsEur').value = v > 0 ? (v / rate).toFixed(1) : '';
  }
}

function qsQuick(eur) {
  document.getElementById('qsEur').value = eur;
  qsConvert('eur');
}

// V4: SWIPE DAYS
// ============================================================
function initSwipe() {
  var el = document.getElementById('dayContent');
  el.addEventListener('touchstart', function(e) {
    swipeTouchStartX = e.touches[0].clientX;
  }, { passive: true });
  el.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - swipeTouchStartX;
    if (Math.abs(dx) < 50) return;
    if (dx < 0 && selectedDayIdx < DAYS.length - 1) {
      el.classList.add('swipe-left');
      setTimeout(function() {
        selectDay(selectedDayIdx + 1);
        el.classList.remove('swipe-left');
      }, 150);
    } else if (dx > 0 && selectedDayIdx > 0) {
      el.classList.add('swipe-right');
      setTimeout(function() {
        selectDay(selectedDayIdx - 1);
        el.classList.remove('swipe-right');
      }, 150);
    }
  }, { passive: true });
}

// ============================================================
// TODAY PANEL
// ============================================================
function renderToday() {
  const panel = document.getElementById('panelToday');
  const now = italyNow();
  const todayStr = italyDateStr();
  const dayIdx = getTripDayIndex();

  if (dayIdx === -1) {
    // Not a trip day
    const tripStart = new Date(TRIP_START + 'T00:00:00');
    const today = new Date(todayStr + 'T00:00:00');
    const diff = Math.ceil((tripStart - today) / (1000 * 60 * 60 * 24));

    if (diff > 0) {
      panel.innerHTML = `
        <div class="no-trip-msg">
          <h2 style="font-family:'Playfair Display',serif">\u610f\u5927\u5229\u7b49\u7dca\u4f60</h2>
          <div class="countdown">${diff} \u65e5</div>
          <p>\u5c31\u51fa\u767c\u5566</p>
          <p style="margin-top:16px;font-size:0.8rem;color:var(--terracotta)">3\u670829\u65e5 \u2013 4\u67084\u65e5, 2026</p>
        </div>`;
    } else {
      panel.innerHTML = `
        <div class="no-trip-msg">
          <h2 style="font-family:'Playfair Display',serif">Arrivederci!</h2>
          <p style="margin-top:8px">\u610f\u5927\u5229\u4e4b\u65c5\u5b8c\u7f8e\u7d50\u675f\u3002<br>\u591a\u7f8e\u597d\u7684\u56de\u61b6\u3002</p>
        </div>`;
    }
    return;
  }

  const day = DAYS[dayIdx];
  const dateNum = new Date(day.date).getDate();
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthName = monthNames[new Date(day.date).getMonth()];

  let html = `
    <div class="today-hero">
      <span class="city-badge ${cityClass(day.city)}">${{milan:'\u7c73\u862d',como:'\u79d1\u83ab\u6e56',florence:'\u7fE1\u51b7\u7fe0',pisa:'\u6bd4\u85a9',rome:'\u7f85\u99ac'}[day.city]||day.city}</span>
      <div class="day-num">${monthName} ${dateNum}</div>
      <div class="day-name">${day.day} \u2014 ${day.label}</div>
      <div class="day-route">${day.route}</div>
    </div>`;

  if (day.hotel) {
    const h = HOTELS[day.hotel];
    const hNav = `<a class="ac-nav" href="https://maps.google.com/maps?q=${h.lat},${h.lng}" target="_blank" style="margin-left:6px">${navSVG()}Go</a>`;
    html += `<div class="hotel-card"><div class="label">${UI.hotel}</div><div class="name">${h.name}${hNav}</div><div class="addr copyable" data-addr="${h.addr}" onclick="copyAddr(this)">${h.addr}${h.note ? ' \u2014 ' + h.note : ''}</div></div>`;
  }

  if (day.warning) {
    html += `<div class="warn-card"><strong>${UI.note}\uff1a</strong> ${day.warning}</div>`;
  }

  // Booking countdown cards for today
  var todayBookings = BOOKINGS.filter(function(b) { return b.date === day.date; });
  if (todayBookings.length) {
    todayBookings.forEach(function(b) {
      var bTime = parseTime(b.time, day.date);
      var cd = formatCountdown(bTime - now);
      html += '<div class="booking-reminder"><div class="br-icon">\uD83C\uDFAB</div><div class="br-info"><div class="br-name">' + b.name + '</div><div class="br-time">' + b.time + (cd ? ' \u2014 ' + cd + '\u5F8C' : b.time && now > bTime ? ' \u2014 \u5DF2\u904E' : '') + '</div></div></div>';
    });
  }

  // Progress bar
  var progress = getDayProgress(day);
  html += '<div class="day-progress"><div class="day-progress-fill" style="width:' + progress + '%"></div></div>';

  // Find current/next activity
  let currentIdx = -1, nextIdx = -1;
  for (let i = 0; i < day.activities.length; i++) {
    const a = day.activities[i];
    const start = parseTime(a.time, day.date);
    const end = a.end ? parseTime(a.end, day.date) : null;
    if (end && now >= start && now < end) { currentIdx = i; break; }
    if (now < start && nextIdx === -1) { nextIdx = i; }
  }

  day.activities.forEach((a, i) => {
    const isCurrent = i === currentIdx;
    const isNext = i === nextIdx && currentIdx === -1;
    const start = parseTime(a.time, day.date);
    const isPast = !isCurrent && now > start && i !== nextIdx;

    let label = '';
    if (isCurrent) label = '<div class="now-label">' + UI.now + '</div>';
    else if (isNext) {
      var cd = formatCountdown(start - now);
      label = '<div class="next-up-label">' + UI.upNext + (cd ? ' <span class="cd">\u2014 ' + cd + '\u5f8c</span>' : '') + '</div>';
    }

    html += renderActivityCard(a, isCurrent, isPast, label, i, dayIdx, isNext);
  });

  panel.innerHTML = html;
  attachCardListeners(panel);
  scrollToCurrentActivity();
}

function renderDaySelector() {
  const container = document.getElementById('daySelector');
  const todayIdx = getTripDayIndex();
  let html = '';

    const dateNum = new Date(d.date).getDate();

    const isActive = i === selectedDayIdx;
    html += `<div class="day-pill${isActive ? ' active' : ''}${isToday && !isActive ? ' today-ring' : ''}" onclick="selectDay(${i})">
      <div class="dnum">${dateNum}</div>

    </div>`;

function selectDay(idx) {
  selectedDayIdx = idx;
  renderDaySelector();
  renderDayContent();
}

function renderDayContent() {
  const day = DAYS[selectedDayIdx];
  const container = document.getElementById('dayContent');
  const dateObj = new Date(day.date);
  const monthNames = ['January','February','March','April'];
  const monthName = monthNames[dateObj.getMonth() - (dateObj.getMonth() >= 3 ? 3 : 0)] || monthNames[dateObj.getMonth()];

  let html = `
    <div class="day-header">
      <span class="city-badge ${cityClass(day.city)}">${{milan:'\u7c73\u862d',como:'\u79d1\u83ab\u6e56',florence:'\u7fE1\u51b7\u7fe0',pisa:'\u6bd4\u85a9',rome:'\u7f85\u99ac'}[day.city]||day.city}</span>
      <h2 style="margin-top:6px">${day.label} \u2014 ${dateObj.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })}</h2>
      <div class="route">${day.route}</div>
    </div>`;

  if (day.hotel) {
    const h = HOTELS[day.hotel];
    const hNav = `<a class="ac-nav" href="https://maps.google.com/maps?q=${h.lat},${h.lng}" target="_blank" style="margin-left:6px">${navSVG()}Go</a>`;
    html += `<div class="hotel-card"><div class="label">${UI.hotel}</div><div class="name">${h.name}${hNav}</div><div class="addr copyable" data-addr="${h.addr}" onclick="copyAddr(this)">${h.addr}${h.note ? ' \u2014 ' + h.note : ''}</div></div>`;
  }

  if (day.warning) {
    html += `<div class="warn-card"><strong>${UI.note}\uff1a</strong> ${day.warning}</div>`;
  }

  // Progress bar (today only)
  if (day.date === italyDateStr()) {
    var progress = getDayProgress(day);
    html += '<div class="day-progress"><div class="day-progress-fill" style="width:' + progress + '%"></div></div>';
  }

  // Weather badge for day header
  var weatherCity = day.city === 'como' ? 'milan' : day.city === 'pisa' ? 'florence' : day.city;
  fetchWeather(weatherCity, function(w) {
    var badge = document.querySelector('#dayContent .weather-badge');
    if (!badge) {
      var header = document.querySelector('#dayContent .day-header');
      if (header) {
        var wb = document.createElement('div');
        wb.className = 'weather-badge';
        wb.style.marginTop = '6px';
        wb.innerHTML = '<span class="wb-icon">' + getWeatherIcon(w.code) + '</span><span class="wb-temp">' + w.temp + '\u00B0C</span>';
        header.appendChild(wb);
      }
    }
  });

  day.activities.forEach((a, i) => {
    html += renderActivityCard(a, false, false, '', i, selectedDayIdx);
  });

  // Optional stops for this city
  const optionals = OPTIONAL_STOPS.filter(o => o.city === day.city || (day.city === 'pisa' && o.city === 'florence'));
  if (optionals.length > 0) {
    html += '<div style="margin-top:16px;margin-bottom:8px;font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(var(--ink),0.3)">' + UI.optional + '</div>';
    optionals.forEach(o => {
      html += `<div class="activity-card" style="opacity:0.6;border-left:3px solid rgba(var(--ink),0.1)">
        <div class="ac-title" style="font-size:0.9rem">${o.name}</div>
        <div class="ac-subtitle">${o.desc}</div>
      </div>`;
    });
  }

  // Discovery spots for this city
  var discCity = DISCOVERY[day.city] ? day.city : (day.city === 'pisa' ? 'florence' : day.city);
  if (typeof DISCOVERY !== 'undefined' && DISCOVERY[discCity]) {
    html += '<div class="discovery-section"><div class="discovery-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>\u63A2\u7D22\u9644\u8FD1</div>';
    var typeIcons = { coffee: '\u2615', gelato: '\uD83C\uDF66', shop: '\uD83D\uDECD\uFE0F', food: '\uD83C\uDF7D\uFE0F', bar: '\uD83C\uDF78', sunset: '\uD83C\uDF05' };
    DISCOVERY[discCity].forEach(function(s) {
      html += '<div class="discovery-card">';
      html += '<div class="dc-icon">' + (typeIcons[s.type] || '\uD83D\uDCCD') + '</div>';
      html += '<div class="dc-info"><div class="dc-name">' + s.name + '<span class="dc-type">' + s.type + '</span></div>';
      html += '<div class="dc-desc">' + s.d + '</div></div>';
      html += '<a class="ac-nav" href="https://maps.google.com/maps?q=' + s.lat + ',' + s.lng + '" target="_blank">' + navSVG() + 'Go</a>';
      html += '</div>';
    });
    html += '</div>';
  }

  container.innerHTML = html;
  attachCardListeners(container);
}

// ============================================================
// ACTIVITY CARD RENDERER
// ============================================================
function renderActivityCard(a, isCurrent, isPast, label, idx, dayIdx, isNext) {
  const hasExpand = a.guide || a.tips || a.tip || a.food || a.prac || a.here || a.highlights || a.img;
  const classes = ['activity-card'];
  if (isCurrent) classes.push('now');
  if (isPast) classes.push('past');

  // Navigate button for locations with coords
  let navBtn = '';
  if (a.lat && a.lng) {
    navBtn = `<a class="ac-nav" href="https://maps.google.com/maps?q=${a.lat},${a.lng}" target="_blank" onclick="event.stopPropagation()">${navSVG()}Navigate</a>`;
  }

  // Collapsed thumbnail
  let thumbHtml = '';
  if (a.img) {
    thumbHtml = '<img class="ac-thumb" src="' + wikiImg(a.img, 120) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
  }

  let expandHtml = '';
  if (hasExpand) {
    expandHtml = '<div class="ac-expand">';

    // Hero image
    if (a.img) {
      expandHtml += '<img class="ac-hero-img loading" src="' + wikiImg(a.img) + '" alt="' + (a.titleEn || a.title) + '" loading="lazy" onload="this.classList.remove(\'loading\')" onerror="this.style.display=\'none\'">';
    }

    // Guide
    if (a.guide) {
      expandHtml += '<div class="ac-expand-section"><div class="ac-expand-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>' + UI.guide + '</div><div class="ac-expand-text">' + a.guide + '</div></div>';
    }

    // Highlights
    if (a.highlights && a.highlights.length > 0) {
      expandHtml += '<div class="ac-highlights"><div class="ac-highlights-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>' + UI.highlights + '</div><ul>';
      a.highlights.forEach(function(h) { expandHtml += '<li>' + h + '</li>'; });
      expandHtml += '</ul></div>';
    }

    // Practical info
    if (a.prac) {
      expandHtml += '<div class="ac-prac">';
      if (a.prac.hrs) expandHtml += '<span class="ac-prac-label">' + UI.hours + '</span><span class="ac-prac-val">' + a.prac.hrs + getOpenBadge(a.prac.hrs) + '</span>';
      if (a.prac.adm) expandHtml += '<span class="ac-prac-label">' + UI.cost + '</span><span class="ac-prac-val">' + a.prac.adm + '</span>';
      if (a.prac.book) expandHtml += '<span class="ac-prac-label">' + UI.booking + '</span><span class="ac-prac-val">' + a.prac.book + '</span>';
      if (a.prac.dress) expandHtml += '<span class="ac-prac-label">' + UI.dress + '</span><span class="ac-prac-val">' + a.prac.dress + '</span>';
      expandHtml += '</div>';
    }

    // Tips (supports both string and object format)
    if (a.tips || a.tip) {
      expandHtml += '<div class="ac-tip">';
      if (a.tip) {
        expandHtml += a.tip;
      } else if (typeof a.tips === 'string') {
        expandHtml += a.tips;
      } else {
        if (a.tips.photo) expandHtml += '<b>' + UI.photo + '\uff1a</b> ' + a.tips.photo + '<br>';
        if (a.tips.crowd) expandHtml += '<b>' + UI.timing + '\uff1a</b> ' + a.tips.crowd + '<br>';
        if (a.tips.insider) expandHtml += '<b>' + UI.insider + '\uff1a</b> ' + a.tips.insider + '<br>';
        if (a.tips.planB) expandHtml += '<b>' + UI.planB + '\uff1a</b> ' + a.tips.planB;
      }
      expandHtml += '</div>';
    }

    // Food (array of mini-cards or legacy string)
    if (a.food && Array.isArray(a.food)) {
      const city = DAYS[dayIdx] ? DAYS[dayIdx].city : '';
      expandHtml += '<div class="ac-expand-section"><div class="ac-expand-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>' + UI.food + '</div></div>';
      expandHtml += '<div class="ac-food-list">';
      a.food.forEach(function(f) {
        const navUrl = 'https://maps.google.com/maps?q=' + encodeURIComponent(f.n + ', ' + city + ', Italy');
        expandHtml += '<div class="ac-food-item">';
        expandHtml += '<div class="ac-food-name">' + f.n + ' <a class="ac-nav" href="' + navUrl + '" target="_blank" onclick="event.stopPropagation()">' + navSVG() + 'Go</a></div>';
        if (f.a) expandHtml += '<div class="ac-food-addr">' + f.a + '</div>';
        expandHtml += '<div class="ac-food-desc">' + f.d + '</div>';
        expandHtml += '</div>';
      });
      expandHtml += '</div>';
    } else if (a.food && typeof a.food === 'string') {
      expandHtml += '<div class="ac-food">' + a.food + '</div>';
    }

    // Getting Here
    if (a.here) {
      expandHtml += '<div class="ac-here"><div class="ac-here-label">' + UI.here + '</div>' + a.here + '</div>';
    }

    // Next Stop
    if (a.next) {
      expandHtml += '<div class="ac-next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>' + UI.next + '\uff1a' + a.next + '</div>';
    }

    expandHtml += '</div>';
  }

  var dataAttrs = ' data-expandable="' + (!!hasExpand) + '"';
  if (isCurrent) dataAttrs += ' data-current="true"';
  if (isNext) dataAttrs += ' data-next="true"';

  var addrHtml = '';
  if (a.addr) {
    addrHtml = '<div class="ac-addr copyable" data-addr="' + a.addr + '" onclick="event.stopPropagation();copyAddr(this)">' + a.addr + '</div>';
  }

  return `${label}<div class="${classes.join(' ')}"${dataAttrs}>
    ${hasExpand ? chevronSVG() : ''}
    ${thumbHtml}
    <div class="ac-time">${a.time}${a.end ? ' \u2013 ' + a.end : ''}</div>
    <div class="ac-title">${a.title}${navBtn}</div>
    ${a.titleEn ? '<div class="ac-title-en">' + a.titleEn + '</div>' : ''}
    ${addrHtml}
    ${a.subtitle ? '<div class="ac-subtitle">' + a.subtitle + '</div>' : ''}
    ${expandHtml}
  </div>`;
}

function attachCardListeners(container) {
  container.querySelectorAll('.activity-card[data-expandable="true"]').forEach(card => {
    card.addEventListener('click', () => {
      card.classList.toggle('open');
    });
  });
}

// ============================================================
// MAP
// ============================================================
const PIN_COLORS = {
  attraction: '#4A8BAD',
  food: '#C65D3E',
  hotel: '#8B5E8B',
  optional: '#999999',
  transport: '#6B7B3F'
};

function createPin(color, size) {
  size = size || 10;
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

function initMap() {
  if (map) { map.invalidateSize(); return; }
  setTimeout(() => {
    map = L.map('map-container', { zoomControl: false }).setView([43.5, 11.5], 6);
    L.control.zoom({ position: 'topright' }).addTo(map);
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var tileUrl = isDark
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    mapTileLayer = L.tileLayer(tileUrl, {
      attribution: '&copy; OpenStreetMap &copy; CartoDB',
      maxZoom: 18
    }).addTo(map);

    // Legend
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function() {
      const div = L.DomUtil.create('div', 'map-legend');
      div.innerHTML = `
        <div class="map-legend-item"><span class="map-legend-dot" style="background:${PIN_COLORS.attraction}"></span> \u666f\u9ede</div>
        <div class="map-legend-item"><span class="map-legend-dot" style="background:${PIN_COLORS.food}"></span> \u7f8e\u98df</div>
        <div class="map-legend-item"><span class="map-legend-dot" style="background:${PIN_COLORS.hotel}"></span> \u9152\u5e97</div>
        <div class="map-legend-item"><span class="map-legend-dot" style="background:${PIN_COLORS.transport}"></span> \u4ea4\u901a</div>
        <div class="map-legend-item"><span class="map-legend-dot" style="background:${PIN_COLORS.optional}"></span> \u53ef\u9078</div>`;
      return div;
    };
    legend.addTo(map);

    renderMapDayTabs();
    renderMapPins(-1);
  }, 100);
}

function renderMapDayTabs() {
  const container = document.getElementById('mapDayTabs');
  let html = `<div class="map-day-tab${mapSelectedDay === -1 ? ' active' : ''}" onclick="selectMapDay(-1)">All</div>`;
  DAYS.forEach((d, i) => {
    html += `<div class="map-day-tab${mapSelectedDay === i ? ' active' : ''}" onclick="selectMapDay(${i})">${d.label}</div>`;
  });
  container.innerHTML = html;
}

function selectMapDay(idx) {
  mapSelectedDay = idx;
  renderMapDayTabs();
  renderMapPins(idx);
}

function renderMapPins(dayIdx) {
  // Clear layers
  mapLayers.forEach(l => map.removeLayer(l));
  mapLayers = [];

  const bounds = [];

  // Hotels
  Object.values(HOTELS).forEach(h => {
    const m = L.marker([h.lat, h.lng], { icon: createPin(PIN_COLORS.hotel, 12) })
      .bindPopup(`<b>${h.name}</b><br>${h.addr}`)
      .addTo(map);
    mapLayers.push(m);
    bounds.push([h.lat, h.lng]);
  });

  // Activities
  const daysToShow = dayIdx === -1 ? DAYS : [DAYS[dayIdx]];
  const CITY_ROUTE_COLORS = { milan: '#6B7B8A', como: '#4A8BAD', florence: '#8B6B4A', pisa: '#C65D3E', rome: '#D4A959' };

  daysToShow.forEach(day => {
    const routePoints = [];
    day.activities.forEach(a => {
      if (!a.lat) return;
      const isFood = a.title.toLowerCase().includes('lunch') || a.title.toLowerCase().includes('dinner') ||
                      a.title.toLowerCase().includes('brunch') || a.title.toLowerCase().includes('aperitivo') ||
                      a.title.toLowerCase().includes('coffee') || a.title.toLowerCase().includes('breakfast');
      const isTransport = a.title.toLowerCase().includes('train') || a.title.toLowerCase().includes('metro') ||
                          a.title.toLowerCase().includes('ferry') || a.title.toLowerCase().includes('station');
      let color = PIN_COLORS.attraction;
      if (isFood) color = PIN_COLORS.food;
      if (isTransport) color = PIN_COLORS.transport;

      const m = L.marker([a.lat, a.lng], { icon: createPin(color) })
        .bindPopup(`<b>${a.title}</b><br><span style="color:#C65D3E;font-size:0.75rem">${a.time}</span>${a.subtitle ? '<br>' + a.subtitle : ''}`)
        .addTo(map);
      mapLayers.push(m);
      bounds.push([a.lat, a.lng]);
      routePoints.push([a.lat, a.lng]);
    });

    // Route polyline
    if (routePoints.length > 1) {
      const line = L.polyline(routePoints, {
        color: CITY_ROUTE_COLORS[day.city] || '#C65D3E',
        weight: 2.5,
        opacity: 0.4,
        dashArray: '6,8'
      }).addTo(map);
      mapLayers.push(line);
    }
  });

  // Optional stops
  if (dayIdx === -1) {
    OPTIONAL_STOPS.forEach(o => {
      const m = L.marker([o.lat, o.lng], { icon: createPin(PIN_COLORS.optional, 8) })
        .bindPopup(`<b>${o.name}</b><br>${o.desc}`)
        .addTo(map);
      mapLayers.push(m);
      bounds.push([o.lat, o.lng]);
    });
  }

  // Discovery spots
  if (typeof DISCOVERY !== 'undefined') {
    var discCities = dayIdx === -1 ? Object.keys(DISCOVERY) : [];
    if (dayIdx >= 0) {
      var c = DAYS[dayIdx].city;
      var dc = DISCOVERY[c] ? c : (c === 'pisa' ? 'florence' : c);
      if (DISCOVERY[dc]) discCities = [dc];
    }
    var discColor = '#9B59B6';
    discCities.forEach(function(city) {
      DISCOVERY[city].forEach(function(s) {
        var typeEmoji = { coffee: '\u2615', gelato: '\uD83C\uDF66', shop: '\uD83D\uDECD', food: '\uD83C\uDF7D\uFE0F', bar: '\uD83C\uDF78', sunset: '\uD83C\uDF05' }[s.type] || '\uD83D\uDCCD';
        var m = L.marker([s.lat, s.lng], { icon: createPin(discColor, 7) })
          .bindPopup('<b>' + typeEmoji + ' ' + s.name + '</b><br><span style="font-size:0.75rem">' + s.d + '</span>')
          .addTo(map);
        mapLayers.push(m);
        if (dayIdx >= 0) bounds.push([s.lat, s.lng]);
      });
    });
  }

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
  }
}

// ============================================================
// EXPENSES
// ============================================================
function getExpenses() {
  try { return JSON.parse(localStorage.getItem('italy_expenses') || '[]'); }
  catch { return []; }
}

function saveExpenses(arr) {
  localStorage.setItem('italy_expenses', JSON.stringify(arr));
}

function handlePhoto(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = (e) => {
      photoData = e.target.result;
      document.getElementById('cameraBtnText').textContent = 'Photo added';
      document.getElementById('cameraBtn').classList.add('has-photo');
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function addExpense() {
  const amount = parseFloat(document.getElementById('expAmount').value);
  if (!amount || amount <= 0) return;
  const cat = document.getElementById('expCategory').value;
  const note = document.getElementById('expNote').value;
  const dayVal = document.getElementById('expDay').value;

  const expense = {
    id: Date.now(),
    amount,
    category: cat,
    note,
    day: dayVal,
    photo: photoData,
    timestamp: new Date().toISOString()
  };

  const expenses = getExpenses();
  expenses.push(expense);
  saveExpenses(expenses);

  // Reset form
  document.getElementById('expAmount').value = '';
  document.getElementById('expNote').value = '';
  photoData = null;
  document.getElementById('cameraBtnText').textContent = 'Add photo';
  document.getElementById('cameraBtn').classList.remove('has-photo');
  document.getElementById('cameraInput').value = '';

  renderExpenses();
}

function deleteExpense(id) {
  const expenses = getExpenses().filter(e => e.id !== id);
  saveExpenses(expenses);
  renderExpenses();
}

function renderExpenses() {
  const expenses = getExpenses();
  const rate = getRate();

  // Summary
  const totalEur = expenses.reduce((s, e) => s + e.amount, 0);
  const todayStr = italyDateStr();
  const todayExpenses = expenses.filter(e => e.day === todayStr);
  const todayEur = todayExpenses.reduce((s, e) => s + e.amount, 0);

  document.getElementById('expenseSummary').innerHTML = `
    <div class="expense-stat">
      <div class="val">\u20ac${totalEur.toFixed(0)}</div>
      <div class="lbl">Trip total</div>
    </div>
    <div class="expense-stat">
      <div class="val">HK$${(totalEur * rate).toFixed(0)}</div>
      <div class="lbl">\u2248 HKD</div>
    </div>
    <div class="expense-stat">
      <div class="val">\u20ac${todayEur.toFixed(0)}</div>
      <div class="lbl">Today</div>
    </div>`;

  // Day selector for form
  const daySelect = document.getElementById('expDay');
  const currentVal = daySelect.value;
  daySelect.innerHTML = '';
  DAYS.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.date;
    opt.textContent = `${d.label} (${new Date(d.date).getDate()}/${new Date(d.date).getMonth()+1})`;
    daySelect.appendChild(opt);
  });
  // Default to today if available
  const todayIdx = getTripDayIndex();
  if (todayIdx >= 0) daySelect.value = DAYS[todayIdx].date;
  else if (currentVal) daySelect.value = currentVal;

  // Expense list grouped by day
  const grouped = {};
  expenses.forEach(e => {
    if (!grouped[e.day]) grouped[e.day] = [];
    grouped[e.day].push(e);
  });

  let listHtml = '';
  // Sort days in reverse
  const sortedDays = Object.keys(grouped).sort().reverse();
  sortedDays.forEach(day => {
    const dayData = DAYS.find(d => d.date === day);
    const dayLabel = dayData ? dayData.label : day;
    const dayTotal = grouped[day].reduce((s, e) => s + e.amount, 0);
    listHtml += `<div class="expense-day-label">${dayLabel} \u2014 \u20ac${dayTotal.toFixed(2)}</div>`;
    grouped[day].reverse().forEach(e => {
      listHtml += `<div class="expense-item">
        <div class="ei-left">
          <div class="ei-cat">${e.category}</div>
          <div class="ei-note">${e.note || '\u2014'}</div>
        </div>
        <div style="text-align:right">
          <div class="ei-amount">\u20ac${e.amount.toFixed(2)}</div>
          <div class="ei-hkd">HK$${(e.amount * rate).toFixed(0)}</div>
        </div>
        <button class="expense-delete" onclick="event.stopPropagation();deleteExpense(${e.id})">\u00d7</button>
      </div>`;
    });
  });

  document.getElementById('expenseList').innerHTML = listHtml;
  document.getElementById('exportBtn').style.display = expenses.length > 0 ? 'block' : 'none';
}

function exportCSV() {
  const expenses = getExpenses();
  const rate = getRate();
  let csv = 'Date,Day,Category,Note,EUR,HKD\n';
  expenses.forEach(e => {
    const dayData = DAYS.find(d => d.date === e.day);
    csv += `${e.day},${dayData ? dayData.label : ''},${e.category},"${(e.note||'').replace(/"/g,'""')}",${e.amount.toFixed(2)},${(e.amount*rate).toFixed(2)}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'italy_2026_expenses.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
function getCheckedItems() {
  try { return JSON.parse(localStorage.getItem('italy_checklist') || '{}'); }
  catch { return {}; }
}

function renderChecklist() {
  const container = document.getElementById('checklist');
  const checked = getCheckedItems();
  let total = 0, done = 0;
  let html = '';

  Object.entries(PACKING).forEach(([group, items]) => {
    html += `<div class="checklist-group"><div class="checklist-group-title">${group}</div>`;
    items.forEach(item => {
      const key = group + ':' + item;
      const isDone = !!checked[key];
      total++;
      if (isDone) done++;
      html += `<div class="check-item${isDone ? ' done' : ''}" onclick="toggleCheck('${key.replace(/'/g, "\\'")}')">
        <div class="check-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        <span class="check-label">${item}</span>
      </div>`;
    });
    html += '</div>';
  });

  container.innerHTML = html;
  document.getElementById('checkProgress').textContent = `${done} / ${total} packed`;
}

function toggleCheck(key) {
  const checked = getCheckedItems();
  checked[key] = !checked[key];
  localStorage.setItem('italy_checklist', JSON.stringify(checked));
  renderChecklist();
}

  let html = '';
  BOOKINGS.forEach(function(b) {
    html += '<div class="booking-card"><div class="bk-left"><div class="bk-title">' + b.title + '</div><div class="bk-detail">' + b.day + ' \u2022 ' + b.time + ' \u2014 ' + b.note + '</div></div><div class="bk-ref" onclick="navigator.clipboard&&navigator.clipboard.writeText(\'' + b.ref.replace(/'/g,"\\'") + '\')" title="Tap to copy">' + b.ref + '</div></div>';
  });
  container.innerHTML = html;
}

function renderCultureTips() {
  const container = document.getElementById('cultureTips');
  if (!container) return;
  let html = '';
  Object.entries(CULTURE_TIPS).forEach(function([city, data]) {
    html += '<div class="culture-card"><h3>' + data.title + '</h3><ul>';
    data.tips.forEach(function(t) { html += '<li>' + t + '</li>'; });
    html += '</ul></div>';
  });
  container.innerHTML = html;
}

function renderAmenities() {
  const container = document.getElementById('amenitiesList');
  if (!container) return;
  let html = '';
  Object.entries(AMENITIES).forEach(function([city, data]) {
    const cityName = city.charAt(0).toUpperCase() + city.slice(1);
    html += '<div class="emergency-card"><div class="em-label">' + cityName + '</div><div class="amenity-list">' + data.atm + '<br>' + data.pharmacy + '<br>' + data.toilet + '</div></div>';
  });
  container.innerHTML = html;
}

// ============================================================
// INIT
// ============================================================
function init() {
  // V4: Init theme
  initTheme();

  // Load saved rate
  const savedRate = localStorage.getItem('italy_rate');
  if (savedRate) document.getElementById('convRate').value = savedRate;

  updateHeader();
  setInterval(updateHeader, 30000);

  renderToday();
  setInterval(renderToday, 60000); // Refresh every minute

  // Default day selection
  const todayIdx = getTripDayIndex();
  selectedDayIdx = todayIdx >= 0 ? todayIdx : 0;
  renderDaySelector();
  renderDayContent();

  renderBookings();
  renderCultureTips();
  renderAmenities();
  renderPhrasebook();
  renderChecklist();
  renderEmergency();
  renderExpenses();

  // V4: Init swipe, weather, quick bar
  initSwipe();
  renderHeaderWeather();
  updateQuickBar();

  // Show Today panel
  switchTab('panelToday', document.querySelector('[data-tab="panelToday"]'));
}

document.addEventListener('DOMContentLoaded', init);

// Offline support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
</body>
</html>
