<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Italy 2026 — R&H</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --terracotta:#C65D3E;--olive:#6B7B3F;--cream:#F5F0E8;--brown:#3D2B1F;--gold:#D4A959;
  --milan:#6B7B8A;--como:#4A8BAD;--florence:#8B6B4A;--pisa:#C65D3E;--rome:#D4A959;
  --card-bg:#FFFFFF;--shadow:0 2px 12px rgba(61,43,31,0.08);
  --radius:12px;--tab-h:64px;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:'Inter',sans-serif;background:var(--cream);color:var(--brown);
  max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;
  padding-bottom:calc(var(--tab-h) + 20px);overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Playfair Display',serif;font-weight:600;line-height:1.25}
h1{font-size:1.5rem}h2{font-size:1.25rem}h3{font-size:1.1rem}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* Header */
.app-header{
  padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(61,43,31,0.06);background:var(--cream);
  position:sticky;top:0;z-index:100;
}
.app-header h1{font-size:1.1rem;letter-spacing:0.02em}
.app-header .subtitle{font-size:0.7rem;color:var(--olive);font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-top:2px}
.header-date{font-size:0.75rem;color:var(--terracotta);font-weight:500;text-align:right}
.header-date .tz{font-size:0.65rem;color:rgba(61,43,31,0.4);display:block;margin-top:1px}

/* Bottom Tabs */
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:var(--tab-h);
  background:var(--card-bg);border-top:1px solid rgba(61,43,31,0.08);
  display:flex;align-items:center;justify-content:space-around;
  z-index:200;padding-bottom:env(safe-area-inset-bottom,0);
}
.tab-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;padding:6px 12px;cursor:pointer;
  color:rgba(61,43,31,0.35);transition:color 0.2s;min-width:56px;
  -webkit-tap-highlight-color:transparent;
}
.tab-btn svg{width:22px;height:22px;transition:transform 0.15s}
.tab-btn span{font-size:0.6rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
.tab-btn.active{color:var(--terracotta)}
.tab-btn.active svg{transform:scale(1.1)}

/* Panels */
.panel{display:none;padding:16px 20px 20px;animation:fadeIn 0.2s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* City badge */
.city-badge{
  display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 8px;
  border-radius:20px;font-size:0.65rem;font-weight:600;letter-spacing:0.06em;
  text-transform:uppercase;
}
.city-badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.city-milan{background:rgba(107,123,138,0.1);color:#6B7B8A}.city-milan::before{background:#6B7B8A}
.city-como{background:rgba(74,139,173,0.1);color:#4A8BAD}.city-como::before{background:#4A8BAD}
.city-florence{background:rgba(139,107,74,0.1);color:#8B6B4A}.city-florence::before{background:#8B6B4A}
.city-pisa{background:rgba(198,93,62,0.1);color:#C65D3E}.city-pisa::before{background:#C65D3E}
.city-rome{background:rgba(212,169,89,0.12);color:#B8923A}.city-rome::before{background:#D4A959}

/* Day card */
.day-selector{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.day-selector::-webkit-scrollbar{display:none}
.day-pill{
  flex-shrink:0;padding:8px 14px;border-radius:20px;border:1.5px solid rgba(61,43,31,0.1);
  background:var(--card-bg);cursor:pointer;text-align:center;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;min-width:60px;
}
.day-pill .dnum{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;line-height:1.2}
.day-pill .dname{font-size:0.55rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:rgba(61,43,31,0.4);margin-top:1px}
.day-pill.active{border-color:var(--terracotta);background:var(--terracotta);color:#fff}
.day-pill.active .dname{color:rgba(255,255,255,0.8)}
.day-pill.today-ring{box-shadow:0 0 0 2px var(--terracotta)}

/* Activity Card */
.activity-card{
  background:var(--card-bg);border-radius:var(--radius);padding:14px 16px;
  margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;
  transition:box-shadow 0.2s;position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.activity-card:active{box-shadow:0 1px 4px rgba(61,43,31,0.12)}
.activity-card.now{border-left:3px solid var(--terracotta)}
.activity-card.past{opacity:0.5}
.ac-time{font-size:0.7rem;font-weight:600;color:var(--terracotta);letter-spacing:0.02em;margin-bottom:3px}
.ac-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;line-height:1.3}
.ac-subtitle{font-size:0.75rem;color:rgba(61,43,31,0.5);margin-top:3px;line-height:1.4}
.ac-expand{display:none;margin-top:12px;padding-top:12px;border-top:1px solid rgba(61,43,31,0.06)}
.activity-card.open .ac-expand{display:block}
.ac-expand-section{margin-bottom:10px}
.ac-expand-label{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--olive);margin-bottom:4px;display:flex;align-items:center;gap:5px}
.ac-expand-label svg{width:12px;height:12px;color:var(--olive)}
.ac-expand-text{font-size:0.8rem;line-height:1.6;color:rgba(61,43,31,0.7)}
.ac-tip{
  background:rgba(198,93,62,0.06);border-radius:8px;padding:8px 10px;
  font-size:0.75rem;line-height:1.5;color:var(--terracotta);margin-top:8px;
}
.ac-food{
  background:rgba(107,123,63,0.06);border-radius:8px;padding:8px 10px;
  font-size:0.75rem;line-height:1.5;color:var(--olive);margin-top:6px;
}
.ac-chevron{
  position:absolute;top:14px;right:14px;width:16px;height:16px;
  color:rgba(61,43,31,0.2);transition:transform 0.2s;
}
.activity-card.open .ac-chevron{transform:rotate(180deg)}

/* Day header */
.day-header{margin-bottom:16px}
.day-header h2{margin-bottom:4px}
.day-header .route{font-size:0.8rem;color:rgba(61,43,31,0.5);font-style:italic;font-family:'Playfair Display',serif}

/* Hotel card */
.hotel-card{
  background:linear-gradient(135deg,rgba(212,169,89,0.08),rgba(212,169,89,0.02));
  border:1px solid rgba(212,169,89,0.2);border-radius:var(--radius);padding:12px 14px;
  margin-bottom:14px;
}
.hotel-card .label{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.hotel-card .name{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:600}
.hotel-card .addr{font-size:0.75rem;color:rgba(61,43,31,0.5);margin-top:2px}

/* Warning card */
.warn-card{
  background:rgba(198,93,62,0.06);border:1px solid rgba(198,93,62,0.15);
  border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;
  font-size:0.8rem;line-height:1.5;color:var(--terracotta);
}
.warn-card strong{font-weight:600}

/* Map panel */
#map-container{height:calc(100vh - 140px);height:calc(100dvh - 140px);border-radius:var(--radius);overflow:hidden;margin-top:8px}
.map-day-tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 0;scrollbar-width:none}
.map-day-tabs::-webkit-scrollbar{display:none}
.map-day-tab{
  flex-shrink:0;padding:6px 12px;border-radius:16px;border:1px solid rgba(61,43,31,0.1);
  background:var(--card-bg);font-size:0.7rem;font-weight:600;cursor:pointer;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent;
}
.map-day-tab.active{background:var(--terracotta);color:#fff;border-color:var(--terracotta)}

/* Expense panel */
.expense-form{
  background:var(--card-bg);border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);margin-bottom:16px;
}
.expense-form label{font-size:0.7rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:rgba(61,43,31,0.5);display:block;margin-bottom:4px;margin-top:10px}
.expense-form label:first-child{margin-top:0}
.expense-form input,.expense-form select{
  width:100%;padding:10px 12px;border:1.5px solid rgba(61,43,31,0.1);border-radius:8px;
  font-family:'Inter',sans-serif;font-size:0.9rem;background:var(--cream);
  color:var(--brown);outline:none;transition:border-color 0.2s;
  -webkit-appearance:none;
}
.expense-form input:focus,.expense-form select:focus{border-color:var(--terracotta)}
.expense-row{display:flex;gap:10px}
.expense-row>div{flex:1}
.btn-primary{
  width:100%;padding:12px;border:none;border-radius:8px;
  background:var(--terracotta);color:#fff;font-family:'Inter',sans-serif;
  font-size:0.85rem;font-weight:600;cursor:pointer;margin-top:14px;
  transition:background 0.2s;-webkit-tap-highlight-color:transparent;
}
.btn-primary:active{background:#B04E30}
.btn-secondary{
  width:100%;padding:10px;border:1.5px solid rgba(61,43,31,0.12);border-radius:8px;
  background:transparent;color:var(--brown);font-family:'Inter',sans-serif;
  font-size:0.8rem;font-weight:500;cursor:pointer;margin-top:8px;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent;
}
.btn-secondary:active{background:rgba(61,43,31,0.04)}
.camera-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px;border:1.5px dashed rgba(61,43,31,0.15);border-radius:8px;
  background:transparent;width:100%;cursor:pointer;color:rgba(61,43,31,0.4);
  font-size:0.8rem;font-weight:500;margin-top:10px;transition:all 0.2s;
  font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;
}
.camera-btn svg{width:18px;height:18px}
.camera-btn:active{background:rgba(61,43,31,0.03)}
.camera-btn.has-photo{border-color:var(--olive);color:var(--olive);border-style:solid}

/* Expense list */
.expense-summary{
  display:flex;gap:12px;margin-bottom:16px;
}
.expense-stat{
  flex:1;background:var(--card-bg);border-radius:var(--radius);padding:14px;
  box-shadow:var(--shadow);text-align:center;
}
.expense-stat .val{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--terracotta)}
.expense-stat .lbl{font-size:0.6rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:rgba(61,43,31,0.4);margin-top:2px}
.expense-item{
  background:var(--card-bg);border-radius:10px;padding:12px 14px;
  margin-bottom:6px;box-shadow:0 1px 4px rgba(61,43,31,0.05);
  display:flex;align-items:center;justify-content:space-between;
}
.expense-item .ei-left{flex:1}
.expense-item .ei-cat{font-size:0.6rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--olive)}
.expense-item .ei-note{font-size:0.8rem;margin-top:2px}
.expense-item .ei-amount{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--terracotta)}
.expense-item .ei-hkd{font-size:0.65rem;color:rgba(61,43,31,0.4);text-align:right}
.expense-day-label{font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(61,43,31,0.3);margin:14px 0 6px;padding-top:8px;border-top:1px solid rgba(61,43,31,0.06)}
.expense-day-label:first-child{margin-top:0;padding-top:0;border-top:none}
.expense-delete{
  background:none;border:none;color:rgba(61,43,31,0.2);cursor:pointer;
  padding:4px 0 4px 10px;font-size:1.1rem;-webkit-tap-highlight-color:transparent;
}

/* More panel */
.more-section{margin-bottom:20px}
.more-section h2{font-size:1.1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.more-section h2 svg{width:20px;height:20px;color:var(--terracotta)}

/* Converter */
.converter-box{
  background:var(--card-bg);border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);
}
.converter-input-group{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.converter-input-group .curr{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;width:44px;flex-shrink:0}
.converter-input-group input{
  flex:1;padding:10px 12px;border:1.5px solid rgba(61,43,31,0.1);border-radius:8px;
  font-family:'Inter',sans-serif;font-size:1rem;background:var(--cream);
  color:var(--brown);outline:none;text-align:right;
}
.converter-input-group input:focus{border-color:var(--terracotta)}
.converter-swap{
  display:flex;align-items:center;justify-content:center;margin:6px 0;
  color:rgba(61,43,31,0.2);
}
.converter-swap svg{width:20px;height:20px}
.quick-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.quick-btn{
  padding:6px 12px;border-radius:16px;border:1px solid rgba(61,43,31,0.1);
  background:var(--card-bg);font-size:0.75rem;font-weight:500;cursor:pointer;
  transition:all 0.15s;-webkit-tap-highlight-color:transparent;
  font-family:'Inter',sans-serif;
}
.quick-btn:active{background:var(--terracotta);color:#fff;border-color:var(--terracotta)}
.converter-rate{
  margin-top:10px;padding-top:10px;border-top:1px solid rgba(61,43,31,0.06);
  display:flex;align-items:center;justify-content:space-between;
}
.converter-rate label{font-size:0.7rem;color:rgba(61,43,31,0.4);font-weight:500}
.converter-rate input{
  width:70px;padding:6px 8px;border:1px solid rgba(61,43,31,0.1);border-radius:6px;
  font-family:'Inter',sans-serif;font-size:0.8rem;text-align:center;
  background:var(--cream);outline:none;
}

/* Phrasebook */
.phrase-group{margin-bottom:14px}
.phrase-group-title{
  font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--olive);margin-bottom:8px;padding-bottom:4px;
  border-bottom:1px solid rgba(107,123,63,0.15);
}
.phrase-item{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:7px 0;border-bottom:1px solid rgba(61,43,31,0.04);
}
.phrase-it{font-weight:600;font-size:0.85rem}
.phrase-pro{font-size:0.7rem;color:rgba(61,43,31,0.35);font-style:italic;margin-left:6px}
.phrase-zh{font-size:0.8rem;color:rgba(61,43,31,0.5);flex-shrink:0;margin-left:8px}

/* Checklist */
.checklist-group{margin-bottom:14px}
.checklist-group-title{
  font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--terracotta);margin-bottom:6px;
}
.check-item{
  display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid rgba(61,43,31,0.04);cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.check-box{
  width:20px;height:20px;border-radius:5px;border:1.5px solid rgba(61,43,31,0.2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.check-item.done .check-box{background:var(--olive);border-color:var(--olive)}
.check-item.done .check-box svg{display:block}
.check-box svg{display:none;width:12px;height:12px;color:#fff}
.check-item.done .check-label{text-decoration:line-through;opacity:0.4}
.check-label{font-size:0.85rem}
.checklist-progress{font-size:0.75rem;color:rgba(61,43,31,0.4);margin-bottom:12px}

/* Emergency */
.emergency-card{
  background:var(--card-bg);border-radius:var(--radius);padding:14px 16px;
  box-shadow:var(--shadow);margin-bottom:8px;
}
.emergency-card .em-label{font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(61,43,31,0.3);margin-bottom:6px}
.emergency-card a{
  display:flex;align-items:center;gap:8px;padding:6px 0;
  color:var(--terracotta);text-decoration:none;font-weight:600;font-size:0.9rem;
}
.emergency-card a svg{width:16px;height:16px;flex-shrink:0}
.emergency-card .em-note{font-size:0.75rem;color:rgba(61,43,31,0.5);margin-top:4px;line-height:1.4}

/* Leaflet overrides */
.leaflet-popup-content-wrapper{border-radius:10px;font-family:'Inter',sans-serif;font-size:0.8rem;box-shadow:0 4px 16px rgba(61,43,31,0.15)}
.leaflet-popup-content{margin:10px 14px;line-height:1.5}
.leaflet-popup-content b{font-family:'Playfair Display',serif;font-weight:600}
.map-legend{
  background:var(--card-bg);border-radius:8px;padding:8px 10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);font-size:0.65rem;line-height:1.8;
}
.map-legend-item{display:flex;align-items:center;gap:5px}
.map-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Today panel specifics */
.today-hero{
  text-align:center;padding:20px 0 16px;
}
.today-hero .day-num{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;line-height:1;color:var(--terracotta)}
.today-hero .day-name{font-size:0.75rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(61,43,31,0.4);margin-top:4px}
.today-hero .day-route{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:rgba(61,43,31,0.6);margin-top:6px}
.now-label{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--terracotta);color:#fff;font-size:0.6rem;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:10px;
  margin-bottom:8px;
}
.now-label::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.next-up-label{
  font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--olive);margin-bottom:8px;
}

/* No trip overlay */
.no-trip-msg{text-align:center;padding:40px 20px;color:rgba(61,43,31,0.4)}
.no-trip-msg h2{color:var(--brown);margin-bottom:8px}
.no-trip-msg p{font-size:0.85rem;line-height:1.5}
.countdown{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:700;color:var(--terracotta);margin:16px 0 8px}

/* V2: Address + Navigate */
.ac-addr{font-size:0.72rem;color:rgba(61,43,31,0.45);margin-top:2px}
.ac-nav{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;background:var(--terracotta);color:#fff;font-size:0.6rem;font-weight:600;text-decoration:none;margin-left:6px;vertical-align:middle;letter-spacing:0.02em}
.ac-nav svg{width:10px;height:10px}
.ac-nav:active{background:#B04E30}

/* V2: Open/Closed badge */
.ac-status{display:inline-flex;align-items:center;gap:3px;font-size:0.6rem;font-weight:700;letter-spacing:0.04em;padding:2px 7px;border-radius:8px;margin-left:6px;vertical-align:middle}
.ac-status.open-now{background:rgba(107,123,63,0.12);color:var(--olive)}
.ac-status.closed-now{background:rgba(198,93,62,0.1);color:var(--terracotta)}

/* V2: Practical info grid */
.ac-prac{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:0.75rem;margin-top:8px;padding:10px 12px;background:rgba(61,43,31,0.02);border-radius:8px;border:1px solid rgba(61,43,31,0.04)}
.ac-prac-label{font-weight:600;color:rgba(61,43,31,0.45);white-space:nowrap}

          <select id="expDay"></select>
        </div>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
        Emergency

    </div>
  </div>
</main>

        guide: "The Flavian Amphitheatre (80 AD) is the largest ever built, holding 50,000\u201380,000 spectators for gladiatorial games, animal hunts, and mock naval battles. The underground hypogeum had 80 vertical shafts with mechanical lifts to transport wild animals to the arena floor. The velarium \u2014 a retractable canvas awning operated by sailors \u2014 shaded spectators from the sun. Look for the cross-section where you can see the internal structure of arches and corridors that made Roman engineering revolutionary.",
        prac: { hrs: '9:00\u201319:15 (Apr)', adm: '\u20ac16 (Colosseum + Forum + Palatine, valid 24h)', book: 'Timed entry at 10:50. Arrive 20 min early \u2014 time slot is STRICT.', dress: 'Comfortable shoes. Sun protection in summer.' },
        tips: { photo: 'Upper level looking down into the hypogeum (underground). Also from the 2nd tier for the full arena perspective.', crowd: 'Follow your timed entry. The upper levels are less crowded and have better views.', insider: 'The included ticket covers Roman Forum + Palatine Hill too (valid 24h). Do Forum right after. The arena floor reconstruction gives you a gladiator\u2019s perspective.', planB: 'If entry is delayed, walk around the exterior \u2014 the Arch of Constantine (free) is right next to it.' },
        here: 'Exit Colosseo metro and it\u2019s right above you. Entrance on the south side (near Arch of Constantine).',
        next: 'Roman Forum \u2192 5 min walk. Exit Colosseum, walk west past the Arch of Constantine, entrance on Via dei Fori Imperiali.' },
      { time: '11:30', end: '12:15', title: 'Roman Forum + Palatine Hill', subtitle: 'Included with Colosseum ticket',
        addr: 'Via della Salara Vecchia 5/6, 00186 Roma',
        lat: 41.892410, lng: 12.485325,
        guide: "The political, religious, and commercial center of ancient Rome for over 1,000 years. Walk along the Via Sacra (Sacred Road) past the Arch of Titus (depicting the sack of Jerusalem), Temple of Saturn (where Rome\u2019s treasury was kept), and the Curia (Senate house). Palatine Hill above has the ruins of imperial palaces and stunning views over the Forum and Circus Maximus.",
        prac: { hrs: '9:00\u201319:15 (included with Colosseum ticket)', adm: 'Included with Colosseum ticket (valid 24h)' },
        tips: { photo: 'From the Palatine Hill terrace overlooking the entire Forum. Also the Arch of Titus with Colosseum behind you.', crowd: 'Walk through Forum first, then climb to Palatine \u2014 most people go straight to Palatine.', insider: 'The Farnese Gardens on Palatine Hill have the best panoramic view and are usually quiet. The House of Augustus has well-preserved frescoes (check if open).' },
        here: 'From Colosseum: walk 5 min west past Arch of Constantine. Forum entrance on Via dei Fori Imperiali.',
        next: 'Pantheon \u2192 15 min walk north via Via dei Fori Imperiali + side streets' },
      { time: '12:15', end: '12:45', title: 'Pantheon', subtitle: '\u20ac5 entry \u2014 15 min walk from Forum',
        addr: 'Piazza della Rotonda, 00186 Roma',
        lat: 41.898637, lng: 12.476862,
        guide: "The best-preserved ancient Roman building, built by Hadrian around 125 AD. The dome\u2019s 8.7m open oculus is still the world\u2019s largest unreinforced concrete dome \u2014 rain falls through and drains via imperceptible floor slopes. Inside lies the tomb of Raphael. Stand in the center and look up: the play of light through the oculus changes throughout the day, and on rainy days a column of rain falls straight through into the floor drain.",
        prac: { hrs: 'Mon\u2013Sat 9:00\u201319:00 / Sun 9:00\u201318:00', adm: '\u20ac5 (online booking recommended)' },
        tips: { photo: 'Stand directly under the oculus and shoot straight up. On sunny days, the light beam sweeping the interior is magical.', insider: 'Visit at noon for the most dramatic light beam effect. The floor tiles are original Roman marble. Raphael\u2019s tomb is on the left side.' },
        food: [
          { n: 'Armando al Pantheon', a: 'Salita dei Crescenzi 31', d: 'Roman institution since 1961. Cacio e pepe, amatriciana, carciofi. \u20ac15\u201330. BOOK ONLINE ONLY \u2014 no walk-ins.' }
        ],
        here: '15 min walk north from Forum: Via dei Fori Imperiali \u2192 Piazza Venezia \u2192 Via del Corso \u2192 side streets to Piazza della Rotonda.',
        next: 'Trevi Fountain \u2192 10 min walk east via Via del Seminario' },
      { time: '12:45', end: '13:15', title: 'Trevi Fountain', subtitle: '\u20ac2 entry \u2014 10 min walk from Pantheon',
        addr: 'Piazza di Trevi, 00187 Roma',
        lat: 41.900932, lng: 12.483313,
        guide: "Rome\u2019s most famous fountain (1762). The tradition: throw a coin with your right hand over your left shoulder to ensure your return to Rome. About \u20ac3,000 is collected daily, donated to Caritas charity. The baroque masterpiece depicts Neptune\u2019s chariot pulled by sea horses \u2014 one calm, one wild, symbolizing the moods of the sea.",
        prac: { hrs: 'Open 24/7. Viewing area entry \u20ac2 (new regulation, limited capacity).', adm: '\u20ac2 entry to the viewing area (reduces overcrowding)' },
        tips: { photo: 'From the right side of the staircase for the classic angle. Early morning or late evening for fewer people.', crowd: '\u20ac2 entry now limits crowds, but still busy 10:00\u201316:00.', insider: 'The \u20ac2 fee was introduced to combat overcrowding \u2014 it actually makes the experience much better now. The fountain is beautifully lit at night if you pass by later.' },
        here: '10 min walk east from Pantheon via Via del Seminario + Via dei Crociferi.',
        next: 'Metro A to Vatican \u2192 walk to Barberini metro (8 min) or continue to Spagna' },
      { time: '13:15', end: '13:45', title: 'Metro A \u2192 Vatican', subtitle: 'Barberini or Spagna \u2192 Ottaviano',
        here: 'Walk 8 min to Barberini metro station (or 5 min to Spagna). Metro A (orange) \u2192 direction Battistini \u2192 exit at Ottaviano. ~15 min ride.',
        next: 'Exit Ottaviano metro \u2192 walk 10 min to Vatican Museums entrance on Viale Vaticano. Follow the signs (or the crowds).' },
      { time: '13:45', end: '17:00', title: 'Vatican Museums + Sistine Chapel', subtitle: 'Guided tour booked 14:00',
        addr: 'Viale Vaticano, 00165 Roma',
        lat: 41.906830, lng: 12.453720,
        guide: "The Vatican Museums house one of the world\u2019s greatest art collections: 54 galleries, 1,400 rooms, and 20,000 works spanning 5,000 years. The route leads through the Gallery of Maps (stunning painted topographical maps of Italy, 120m long), the Raphael Rooms (School of Athens), and culminates in the Sistine Chapel \u2014 Michelangelo\u2019s ceiling (1508\u20131512) and Last Judgement (1536\u20131541). After the Sistine Chapel, exit directly into St. Peter\u2019s Basilica \u2014 the largest church in the world. Michelangelo\u2019s Piet\u00e0 is just inside the entrance on the right.",
        prac: { hrs: 'Mon\u2013Sat 8:00\u201319:00 (last entry 16:00)', adm: '\u20ac17 (online) / Guided tour included in booking', book: 'Guided tour booked for 14:00. Meet at the entrance.', dress: 'Cover shoulders & knees (strictly enforced). No tripods. Photos OK except Sistine Chapel (officially no photos, but everyone does).' },
        tips: { photo: 'Gallery of Maps \u2014 the long perspective shot is stunning. Raphael\u2019s School of Athens. St. Peter\u2019s interior from the nave. Piet\u00e0 through the glass.', crowd: 'The guided tour will navigate crowds for you. Stay with your guide in the Sistine Chapel.', insider: 'In the Sistine Chapel, look for Michelangelo\u2019s self-portrait in the Last Judgement (he painted his face on St. Bartholomew\u2019s flayed skin). Exit the Sistine Chapel through the right-side door to go directly into St. Peter\u2019s Basilica (ask your guide).', planB: 'If the museums are overwhelming, skip some galleries and head straight to the Raphael Rooms and Sistine Chapel (your guide will prioritize).' },
        food: [
          { n: 'Panificio Bonci', a: 'Via Trionfale 36', d: 'Legendary pizza al taglio (sold by weight). Try the mortadella or potato/rosemary. \u20ac5\u201310. 10 min walk from Vatican.' }
        ],
        here: 'From Ottaviano metro: 10 min walk to Vatican Museums entrance on Viale Vaticano. Follow signs.',
        next: 'After St. Peter\u2019s: walk to Spanish Steps area \u2192 Bus 64 from Via della Conciliazione (30 min) or Metro A Ottaviano \u2192 Spagna (3 stops)' },
      { time: '18:00', end: '20:00', title: 'Spanish Steps + dinner', subtitle: 'Via dei Condotti luxury shopping',
        addr: 'Piazza di Spagna, 00187 Roma',
        lat: 41.905990, lng: 12.482770,
        guide: "The 135 Trinit\u00e0 dei Monti steps (1725) are Rome\u2019s most famous staircase, connecting Piazza di Spagna to the Trinit\u00e0 dei Monti church above. Sitting on the steps has been BANNED since 2019 (\u20ac400 fine) \u2014 stand and admire instead. Via dei Condotti at the base is Rome\u2019s premier luxury shopping street (Bulgari, Gucci, Valentino, Prada). The Keats-Shelley Memorial House is at the foot of the steps.",
        prac: { hrs: 'Shops on Via dei Condotti 10:00\u201319:30' },
        tips: { photo: 'From the bottom looking up at sunset, or from the top (Trinit\u00e0 dei Monti) looking down over the rooftops.', insider: 'The Barcaccia fountain at the base (by Bernini\u2019s father) is a low-pressure fountain shaped like a sinking boat \u2014 a clever solution to low water pressure. Via Margutta (one street over) is a quieter, artistic street where Audrey Hepburn\u2019s character lived in Roman Holiday.' },
        food: [
          { n: 'Pastificio Guerra', a: 'Via della Croce 8', d: 'Fresh pasta shop \u2014 \u20ac5 for a plate of the day, eaten standing. Rome\u2019s best budget lunch. CASH ONLY.' },
          { n: 'Enoteca Antica', a: 'Via della Croce 76b', d: 'Wine bar with bruschetta, salumi, and cheese boards. Relaxed, local vibe. \u20ac12\u201325.' }
        ],
        here: 'From Vatican: Metro A Ottaviano \u2192 Spagna (3 stops, 8 min). Exit and you\u2019re at the bottom of the Steps.',
        next: 'Trastevere \u2192 Bus H from Piazza Barberini (20 min) or taxi \u20ac8\u201310' },
      { time: '20:30', end: '22:00', title: 'Trastevere night walk', subtitle: 'Rome\u2019s most charming neighborhood',
        addr: 'Trastevere, Roma',
        lat: 41.889300, lng: 12.469800,
        guide: "Trastevere (\u2018across the Tiber\u2019) is Rome\u2019s most atmospheric neighborhood \u2014 narrow medieval cobblestone streets, ivy-covered ochre buildings, tiny piazzas with fountains, and live music drifting from trattorias. Piazza Santa Maria in Trastevere is the heart, with its 12th-century church (stunning gold mosaics, usually open until 21:00). The neighborhood comes alive after 20:00 \u2014 it\u2019s Rome\u2019s best area for a passeggiata (evening stroll) and late dinner.",
        tips: { photo: 'The narrow streets lit by warm light at night. Piazza Santa Maria in Trastevere with the fountain and church facade.', insider: 'For the best experience, just wander the side streets. Via della Lungaretta and Vicolo del Cinque have the most atmosphere. Arrive at Da Enzo early (19:30) or expect a 45+ min queue.' },
        food: [
          { n: 'Da Enzo al 29', a: 'Via dei Vascellari 29', d: 'Legendary Roman trattoria. Cacio e pepe, carbonara, carciofi alla giudia. \u20ac12\u201320. NO reservations \u2014 queue early (19:30) or late (21:30).' },
          { n: 'Tonnarello', a: 'Via della Paglia 77', d: 'Big portions of classic Roman pasta. Livelier atmosphere, outdoor seating. \u20ac10\u201320. More forgiving on walk-ins.' }
        ],
        here: 'From Spanish Steps: Bus H from Piazza Barberini (20 min) or taxi ~\u20ac10. Or walk from Piazza Venezia across Ponte Garibaldi (25 min).',
        next: 'Hotel \u2192 Bus H or Night Bus to Termini, or taxi ~\u20ac12. Long day \u2014 rest well!' }
    ]

      { time: '10:30', end: '11:30', title: 'Trevi Fountain (revisit)', subtitle: 'Morning visit \u2014 fewer crowds than yesterday',

      { time: '13:00', end: '15:00', title: 'Capitoline Museums', subtitle: 'World\u2019s oldest public museum',

        addr: 'Piazza del Campidoglio 1, 00186 Roma',
        guide: "Founded in 1471 when Pope Sixtus IV donated a collection of bronze statues to the Roman people, making this the world\u2019s oldest public museum. The piazza was designed by Michelangelo in 1536 \u2014 note the geometric star pattern on the pavement. Inside: the original bronze Marcus Aurelius equestrian statue, the iconic Capitoline Wolf (Lupa), the Dying Gaul, and Caravaggio\u2019s stunning \u201cSt. John the Baptist\u201d and \u201cFortune Teller\u201d. Don\u2019t miss the underground Tabularium gallery connecting the two buildings \u2014 it has the best views of the Roman Forum.",

        tips: { photo: 'The Tabularium gallery frames the Forum perfectly \u2014 the best elevated Forum photo in Rome.', crowd: 'Good Friday = many museums are busy. Go straight to the Tabularium first, then work backwards.', insider: 'The Palazzo dei Conservatori caf\u00e9 on the 2nd floor terrace has an incredible view of Rome\u2019s rooftops with coffee for \u20ac3. Hidden gem.', planB: 'If queue is long (unlikely on Good Friday), the Vittoriano rooftop elevator next door (\u20ac7) offers 360\u00b0 views of Rome.' },

          { n: 'Taverna degli Amici', a: 'Piazza Margana 37', d: 'Hidden piazza 3 min from Campidoglio. Roman classics: cacio e pepe \u20ac12, saltimbocca \u20ac16. Outdoor seating in a medieval courtyard. Open 12:00\u201323:00.' }

      { time: '15:00', end: '17:00', title: 'Trastevere late lunch', subtitle: 'Relaxed afternoon in the village quarter',

      { time: '17:00', end: '19:00', title: 'Castel Sant\u2019Angelo', subtitle: 'Hadrian\u2019s Tomb + best sunset view',
        lat: 41.903087, lng: 12.466319,
        addr: 'Lungotevere Castello 50, 00193 Roma',
        guide: "Built by Emperor Hadrian as his mausoleum in 139 AD, this cylindrical fortress has served as a castle, prison, papal refuge, and museum. The Passetto di Borgo \u2014 a secret elevated passage \u2014 connects it directly to the Vatican, used by popes fleeing danger (most famously by Pope Clement VII during the 1527 Sack of Rome). The rooftop terrace offers arguably the best view of St. Peter\u2019s dome in all of Rome, and the bronze angel statue on top commemorates the plague\u2019s end in 590 AD when Archangel Michael appeared above.",
        prac: { hrs: '09:00\u201319:30 (last entry 18:30)', adm: '\u20ac15 full / \u20ac2 reduced (EU 18-25). Free first Sunday of month.', dress: 'Comfortable shoes \u2014 lots of stairs to the rooftop. No dress code.' },
        tips: { photo: 'The rooftop terrace at golden hour (17:30\u201318:30 in April) gives the iconic St. Peter\u2019s dome shot with warm light.', crowd: 'Late afternoon is perfect \u2014 morning crowds have left, and you\u2019ll catch golden hour from the top.', insider: 'In the Papal Apartments on the upper floors, look for the bathroom of Pope Clement VII \u2014 frescoed by Giulio Romano (Raphael\u2019s student) with scenes too risqu\u00e9 for a pope.', planB: 'If closed for Good Friday (unlikely but possible): walk across Ponte Sant\u2019Angelo instead \u2014 the bridge itself has 10 angel statues by Bernini and is free to enjoy.' },

      { time: '21:15', end: '23:00', title: 'Via Crucis at Colosseum', subtitle: 'Free, torchlit, led by Pope Francis',
        lat: 41.890210, lng: 12.492231,

// UTILS

function italyNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: TZ }));
}

function italyDateStr() {
  const d = italyNow();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getTripDayIndex() {
  const today = italyDateStr();
  return DAYS.findIndex(d => d.date === today);
}

function parseTime(timeStr, dateStr) {
  const [h, m] = timeStr.split(':').map(Number);
  const [y, mo, da] = dateStr.split('-').map(Number);
  return new Date(y, mo - 1, da, h, m);
}

function cityClass(city) {
  return 'city-' + city;
}

function getRate() {
  const stored = localStorage.getItem('italy_rate');
  return stored ? parseFloat(stored) : DEFAULT_RATE;
}

function saveRate() {
  const v = parseFloat(document.getElementById('convRate').value);
  if (v > 0) localStorage.setItem('italy_rate', v);
}

function chevronSVG() {
  return '<svg class="ac-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';
}

function navSVG() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>';
}

function getOpenBadge(hrsStr) {
  try {
    const now = italyNow();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    const match = hrsStr.match(/(\d{1,2}):(\d{2})\s*[\u2013\-]\s*(\d{1,2}):(\d{2})/);
    if (!match) return '';
    const openMin = parseInt(match[1]) * 60 + parseInt(match[2]);
    const closeMin = parseInt(match[3]) * 60 + parseInt(match[4]);
    const isOpen = nowMin >= openMin && nowMin < closeMin;
    return ' <span class="ac-status ' + (isOpen ? 'open-now' : 'closed-now') + '">' + (isOpen ? 'Open' : 'Closed') + '</span>';
  } catch(e) { return ''; }
}

// TODAY PANEL
// ============================================================
function renderToday() {
  const panel = document.getElementById('panelToday');
  const now = italyNow();
  const todayStr = italyDateStr();
  const dayIdx = getTripDayIndex();

  if (dayIdx === -1) {
    // Not a trip day
    const tripStart = new Date(TRIP_START + 'T00:00:00');
    const today = new Date(todayStr + 'T00:00:00');
    const diff = Math.ceil((tripStart - today) / (1000 * 60 * 60 * 24));

    if (diff > 0) {
      panel.innerHTML = `
        <div class="no-trip-msg">
          <h2 style="font-family:'Playfair Display',serif">Italy awaits</h2>
          <div class="countdown">${diff} day${diff !== 1 ? 's' : ''}</div>
          <p>until your adventure begins</p>
          <p style="margin-top:16px;font-size:0.8rem;color:var(--terracotta)">Mar 29 \u2013 Apr 4, 2026</p>
        </div>`;
    } else {
      panel.innerHTML = `
        <div class="no-trip-msg">
          <h2 style="font-family:'Playfair Display',serif">Arrivederci!</h2>
          <p style="margin-top:8px">Your Italian journey has concluded.<br>What an adventure it was.</p>
        </div>`;
    }
    return;
  }

  const day = DAYS[dayIdx];
  const dateNum = new Date(day.date).getDate();
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthName = monthNames[new Date(day.date).getMonth()];

  let html = `
    <div class="today-hero">
      <span class="city-badge ${cityClass(day.city)}">${day.city === 'como' ? 'Lake Como' : day.city.charAt(0).toUpperCase() + day.city.slice(1)}</span>
      <div class="day-num">${monthName} ${dateNum}</div>
      <div class="day-name">${day.day} \u2014 ${day.label}</div>
      <div class="day-route">${day.route}</div>
    </div>`;

  if (day.hotel) {
    const h = HOTELS[day.hotel];
    const hNav = `<a class="ac-nav" href="https://maps.google.com/maps?q=${h.lat},${h.lng}" target="_blank" style="margin-left:6px">${navSVG()}Go</a>`;
    html += `<div class="hotel-card"><div class="label">Tonight</div><div class="name">${h.name}${hNav}</div><div class="addr">${h.addr}${h.note ? ' \u2014 ' + h.note : ''}</div></div>`;
  }

  if (day.warning) {
    html += `<div class="warn-card"><strong>Note:</strong> ${day.warning}</div>`;
  }

  // Find current/next activity
  let currentIdx = -1, nextIdx = -1;
  for (let i = 0; i < day.activities.length; i++) {
    const a = day.activities[i];
    const start = parseTime(a.time, day.date);
    const end = a.end ? parseTime(a.end, day.date) : null;
    if (end && now >= start && now < end) { currentIdx = i; break; }
    if (now < start && nextIdx === -1) { nextIdx = i; }
  }

  day.activities.forEach((a, i) => {
    const isCurrent = i === currentIdx;
    const isNext = i === nextIdx && currentIdx === -1;
    const start = parseTime(a.time, day.date);
    const isPast = !isCurrent && now > start && i !== nextIdx;

    let label = '';
    if (isCurrent) label = '<div class="now-label">Now</div>';
    else if (isNext) label = '<div class="next-up-label">Up next</div>';

    html += renderActivityCard(a, isCurrent, isPast, label, i, dayIdx);
  });

  panel.innerHTML = html;
  attachCardListeners(panel);
}

function renderDaySelector() {
  const container = document.getElementById('daySelector');
  const todayIdx = getTripDayIndex();
  let html = '';
  DAYS.forEach((d, i) => {
    const dateNum = new Date(d.date).getDate();
    const isToday = i === todayIdx;
    const isActive = i === selectedDayIdx;
    html += `<div class="day-pill${isActive ? ' active' : ''}${isToday && !isActive ? ' today-ring' : ''}" onclick="selectDay(${i})">
      <div class="dnum">${dateNum}</div>
      <div class="dname">${d.day}</div>
    </div>`;
  });
  container.innerHTML = html;
}

function selectDay(idx) {
  selectedDayIdx = idx;
  renderDaySelector();
  renderDayContent();
}

function renderDayContent() {
  const day = DAYS[selectedDayIdx];
  const container = document.getElementById('dayContent');
  const dateObj = new Date(day.date);
  const monthNames = ['January','February','March','April'];
  const monthName = monthNames[dateObj.getMonth() - (dateObj.getMonth() >= 3 ? 3 : 0)] || monthNames[dateObj.getMonth()];

  let html = `
    <div class="day-header">
      <span class="city-badge ${cityClass(day.city)}">${day.city === 'como' ? 'Lake Como' : day.city.charAt(0).toUpperCase() + day.city.slice(1)}</span>
      <h2 style="margin-top:6px">${day.label} \u2014 ${dateObj.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })}</h2>
      <div class="route">${day.route}</div>
    </div>`;

  if (day.hotel) {
    const h = HOTELS[day.hotel];
    const hNav = `<a class="ac-nav" href="https://maps.google.com/maps?q=${h.lat},${h.lng}" target="_blank" style="margin-left:6px">${navSVG()}Go</a>`;
    html += `<div class="hotel-card"><div class="label">Hotel</div><div class="name">${h.name}${hNav}</div><div class="addr">${h.addr}${h.note ? ' \u2014 ' + h.note : ''}</div></div>`;
  }

  if (day.warning) {
    html += `<div class="warn-card"><strong>Note:</strong> ${day.warning}</div>`;
  }

  day.activities.forEach((a, i) => {
    html += renderActivityCard(a, false, false, '', i, selectedDayIdx);
  });

  // Optional stops for this city
  const optionals = OPTIONAL_STOPS.filter(o => o.city === day.city || (day.city === 'pisa' && o.city === 'florence'));
  if (optionals.length > 0) {
    html += '<div style="margin-top:16px;margin-bottom:8px;font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(61,43,31,0.3)">Optional Nearby</div>';
    optionals.forEach(o => {
      html += `<div class="activity-card" style="opacity:0.6;border-left:3px solid rgba(61,43,31,0.1)">
        <div class="ac-title" style="font-size:0.9rem">${o.name}</div>
        <div class="ac-subtitle">${o.desc}</div>
      </div>`;
    });
  }

  container.innerHTML = html;
  attachCardListeners(container);
}

// ============================================================
// ACTIVITY CARD RENDERER
// ============================================================
function renderActivityCard(a, isCurrent, isPast, label, idx, dayIdx) {
  const hasExpand = a.guide || a.tips || a.tip || a.food || a.prac || a.here;
  const classes = ['activity-card'];
  if (isCurrent) classes.push('now');
  if (isPast) classes.push('past');

  // Navigate button for locations with coords
  let navBtn = '';
  if (a.lat && a.lng) {
    navBtn = `<a class="ac-nav" href="https://maps.google.com/maps?q=${a.lat},${a.lng}" target="_blank" onclick="event.stopPropagation()">${navSVG()}Navigate</a>`;
  }

  let expandHtml = '';
  if (hasExpand) {
    expandHtml = '<div class="ac-expand">';

    // Guide
    if (a.guide) {
      expandHtml += `<div class="ac-expand-section">
        <div class="ac-expand-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>Guide</div>
        <div class="ac-expand-text">${a.guide}</div>
      </div>`;
    }

    // Practical info
    if (a.prac) {
      expandHtml += '<div class="ac-prac">';
      if (a.prac.hrs) expandHtml += '<span class="ac-prac-label">Hours</span><span class="ac-prac-val">' + a.prac.hrs + getOpenBadge(a.prac.hrs) + '</span>';
      if (a.prac.adm) expandHtml += '<span class="ac-prac-label">Cost</span><span class="ac-prac-val">' + a.prac.adm + '</span>';
      if (a.prac.book) expandHtml += '<span class="ac-prac-label">Booking</span><span class="ac-prac-val">' + a.prac.book + '</span>';
      if (a.prac.dress) expandHtml += '<span class="ac-prac-label">Dress</span><span class="ac-prac-val">' + a.prac.dress + '</span>';
      expandHtml += '</div>';
    }

    // Tips (supports both string and object format)
    if (a.tips || a.tip) {
      expandHtml += '<div class="ac-tip">';
      if (a.tip) {
        expandHtml += a.tip;
      } else if (typeof a.tips === 'string') {
        expandHtml += a.tips;
      } else {
        if (a.tips.photo) expandHtml += '<b>Best shot:</b> ' + a.tips.photo + '<br>';
        if (a.tips.crowd) expandHtml += '<b>Timing:</b> ' + a.tips.crowd + '<br>';
        if (a.tips.insider) expandHtml += '<b>Insider:</b> ' + a.tips.insider + '<br>';
        if (a.tips.planB) expandHtml += '<b>Plan B:</b> ' + a.tips.planB;
      }
      expandHtml += '</div>';
    }

    // Food (array of mini-cards or legacy string)
    if (a.food && Array.isArray(a.food)) {
      const city = DAYS[dayIdx] ? DAYS[dayIdx].city : '';
      expandHtml += '<div class="ac-food-list">';
      a.food.forEach(function(f) {
        const navUrl = 'https://maps.google.com/maps?q=' + encodeURIComponent(f.n + ', ' + city + ', Italy');
        expandHtml += '<div class="ac-food-item">';
        expandHtml += '<div class="ac-food-name">' + f.n + ' <a class="ac-nav" href="' + navUrl + '" target="_blank" onclick="event.stopPropagation()">' + navSVG() + 'Go</a></div>';
        if (f.a) expandHtml += '<div class="ac-food-addr">' + f.a + '</div>';
        expandHtml += '<div class="ac-food-desc">' + f.d + '</div>';
        expandHtml += '</div>';
      });
      expandHtml += '</div>';
    } else if (a.food && typeof a.food === 'string') {
      expandHtml += '<div class="ac-food">' + a.food + '</div>';
    }

    // Getting Here
    if (a.here) {
      expandHtml += '<div class="ac-here"><div class="ac-here-label">Getting Here</div>' + a.here + '</div>';
    }

    // Next Stop
    if (a.next) {
      expandHtml += '<div class="ac-next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>Next: ' + a.next + '</div>';
    }

    expandHtml += '</div>';
  }

  return `${label}<div class="${classes.join(' ')}" data-expandable="${hasExpand}">
    ${hasExpand ? chevronSVG() : ''}
    <div class="ac-time">${a.time}${a.end ? ' \u2013 ' + a.end : ''}</div>
    <div class="ac-title">${a.title}${navBtn}</div>
    ${a.addr ? '<div class="ac-addr">' + a.addr + '</div>' : ''}
    ${a.subtitle ? '<div class="ac-subtitle">' + a.subtitle + '</div>' : ''}
    ${expandHtml}
  </div>`;
}

function attachCardListeners(container) {
  container.querySelectorAll('.activity-card[data-expandable="true"]').forEach(card => {
    card.addEventListener('click', () => {
      card.classList.toggle('open');
    });
  });
}

// ============================================================
// MAP
// ============================================================
const PIN_COLORS = {
  attraction: '#4A8BAD',
  food: '#C65D3E',
  hotel: '#8B5E8B',
  optional: '#999999',
  transport: '#6B7B3F'
};

function createPin(color, size) {
  size = size || 10;
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

function initMap() {
  if (map) { map.invalidateSize(); return; }
  setTimeout(() => {
    map = L.map('map-container', { zoomControl: false }).setView([43.5, 11.5], 6);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap',
      maxZoom: 18
    }).addTo(map);

    // Legend
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function() {
      const div = L.DomUtil.create('div', 'map-legend');
      div.innerHTML = `
        <div class="map-legend-item"><span class="map-legend-dot" style="background:${PIN_COLORS.attraction}"></span> Attraction</div>
        <div class="map-legend-item"><span class="map-legend-dot" style="background:${PIN_COLORS.food}"></span> Food</div>
        <div class="map-legend-item"><span class="map-legend-dot" style="background:${PIN_COLORS.hotel}"></span> Hotel</div>
        <div class="map-legend-item"><span class="map-legend-dot" style="background:${PIN_COLORS.transport}"></span> Transport</div>
        <div class="map-legend-item"><span class="map-legend-dot" style="background:${PIN_COLORS.optional}"></span> Optional</div>`;
      return div;
    };
    legend.addTo(map);

    renderMapDayTabs();
    renderMapPins(-1);
  }, 100);
}

function renderMapDayTabs() {
  const container = document.getElementById('mapDayTabs');
  let html = `<div class="map-day-tab${mapSelectedDay === -1 ? ' active' : ''}" onclick="selectMapDay(-1)">All</div>`;
  DAYS.forEach((d, i) => {
    html += `<div class="map-day-tab${mapSelectedDay === i ? ' active' : ''}" onclick="selectMapDay(${i})">${d.label}</div>`;
  });
  container.innerHTML = html;
}

function selectMapDay(idx) {
  mapSelectedDay = idx;
  renderMapDayTabs();
  renderMapPins(idx);
}

function renderMapPins(dayIdx) {
  // Clear layers
  mapLayers.forEach(l => map.removeLayer(l));
  mapLayers = [];

  const bounds = [];

  // Hotels
  Object.values(HOTELS).forEach(h => {
    const m = L.marker([h.lat, h.lng], { icon: createPin(PIN_COLORS.hotel, 12) })
      .bindPopup(`<b>${h.name}</b><br>${h.addr}`)
      .addTo(map);
    mapLayers.push(m);
    bounds.push([h.lat, h.lng]);
  });

  // Activities
  const daysToShow = dayIdx === -1 ? DAYS : [DAYS[dayIdx]];
  const CITY_ROUTE_COLORS = { milan: '#6B7B8A', como: '#4A8BAD', florence: '#8B6B4A', pisa: '#C65D3E', rome: '#D4A959' };

  daysToShow.forEach(day => {
    const routePoints = [];
    day.activities.forEach(a => {
      if (!a.lat) return;
      const isFood = a.title.toLowerCase().includes('lunch') || a.title.toLowerCase().includes('dinner') ||
                      a.title.toLowerCase().includes('brunch') || a.title.toLowerCase().includes('aperitivo') ||
                      a.title.toLowerCase().includes('coffee') || a.title.toLowerCase().includes('breakfast');
      const isTransport = a.title.toLowerCase().includes('train') || a.title.toLowerCase().includes('metro') ||
                          a.title.toLowerCase().includes('ferry') || a.title.toLowerCase().includes('station');
      let color = PIN_COLORS.attraction;
      if (isFood) color = PIN_COLORS.food;
      if (isTransport) color = PIN_COLORS.transport;

      const m = L.marker([a.lat, a.lng], { icon: createPin(color) })
        .bindPopup(`<b>${a.title}</b><br><span style="color:#C65D3E;font-size:0.75rem">${a.time}</span>${a.subtitle ? '<br>' + a.subtitle : ''}`)
        .addTo(map);
      mapLayers.push(m);
      bounds.push([a.lat, a.lng]);
      routePoints.push([a.lat, a.lng]);
    });

    // Route polyline
    if (routePoints.length > 1) {
      const line = L.polyline(routePoints, {
        color: CITY_ROUTE_COLORS[day.city] || '#C65D3E',
        weight: 2.5,
        opacity: 0.4,
        dashArray: '6,8'
      }).addTo(map);
      mapLayers.push(line);
    }
  });

  // Optional stops
  if (dayIdx === -1) {
    OPTIONAL_STOPS.forEach(o => {
      const m = L.marker([o.lat, o.lng], { icon: createPin(PIN_COLORS.optional, 8) })
        .bindPopup(`<b>${o.name}</b><br>${o.desc}`)
        .addTo(map);
      mapLayers.push(m);
      bounds.push([o.lat, o.lng]);
    });
  }

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
  }
}

// ============================================================
// EXPENSES
// ============================================================
function getExpenses() {
  try { return JSON.parse(localStorage.getItem('italy_expenses') || '[]'); }
  catch { return []; }
}

function saveExpenses(arr) {
  localStorage.setItem('italy_expenses', JSON.stringify(arr));
}

function handlePhoto(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = (e) => {
      photoData = e.target.result;
      document.getElementById('cameraBtnText').textContent = 'Photo added';
      document.getElementById('cameraBtn').classList.add('has-photo');
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function addExpense() {
  const amount = parseFloat(document.getElementById('expAmount').value);
  if (!amount || amount <= 0) return;
  const cat = document.getElementById('expCategory').value;
  const note = document.getElementById('expNote').value;
  const dayVal = document.getElementById('expDay').value;

  const expense = {
    id: Date.now(),
    amount,
    category: cat,
    note,
    day: dayVal,
    photo: photoData,
    timestamp: new Date().toISOString()
  };

  const expenses = getExpenses();
  expenses.push(expense);
  saveExpenses(expenses);

  // Reset form
  document.getElementById('expAmount').value = '';
  document.getElementById('expNote').value = '';
  photoData = null;
  document.getElementById('cameraBtnText').textContent = 'Add photo';
  document.getElementById('cameraBtn').classList.remove('has-photo');
  document.getElementById('cameraInput').value = '';

  renderExpenses();
}

function deleteExpense(id) {
  const expenses = getExpenses().filter(e => e.id !== id);
  saveExpenses(expenses);
  renderExpenses();
}

function renderExpenses() {
  const expenses = getExpenses();
  const rate = getRate();

  // Summary
  const totalEur = expenses.reduce((s, e) => s + e.amount, 0);
  const todayStr = italyDateStr();
  const todayExpenses = expenses.filter(e => e.day === todayStr);
  const todayEur = todayExpenses.reduce((s, e) => s + e.amount, 0);

  document.getElementById('expenseSummary').innerHTML = `
    <div class="expense-stat">
      <div class="val">\u20ac${totalEur.toFixed(0)}</div>
      <div class="lbl">Trip total</div>
    </div>
    <div class="expense-stat">
      <div class="val">HK$${(totalEur * rate).toFixed(0)}</div>
      <div class="lbl">\u2248 HKD</div>
    </div>
    <div class="expense-stat">
      <div class="val">\u20ac${todayEur.toFixed(0)}</div>
      <div class="lbl">Today</div>
    </div>`;

  // Day selector for form
  const daySelect = document.getElementById('expDay');
  const currentVal = daySelect.value;
  daySelect.innerHTML = '';
  DAYS.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.date;
    opt.textContent = `${d.label} (${new Date(d.date).getDate()}/${new Date(d.date).getMonth()+1})`;
    daySelect.appendChild(opt);
  });
  // Default to today if available
  const todayIdx = getTripDayIndex();
  if (todayIdx >= 0) daySelect.value = DAYS[todayIdx].date;
  else if (currentVal) daySelect.value = currentVal;

  // Expense list grouped by day
  const grouped = {};
  expenses.forEach(e => {
    if (!grouped[e.day]) grouped[e.day] = [];
    grouped[e.day].push(e);
  });

  let listHtml = '';
  // Sort days in reverse
  const sortedDays = Object.keys(grouped).sort().reverse();
  sortedDays.forEach(day => {
    const dayData = DAYS.find(d => d.date === day);
    const dayLabel = dayData ? dayData.label : day;
    const dayTotal = grouped[day].reduce((s, e) => s + e.amount, 0);
    listHtml += `<div class="expense-day-label">${dayLabel} \u2014 \u20ac${dayTotal.toFixed(2)}</div>`;
    grouped[day].reverse().forEach(e => {
      listHtml += `<div class="expense-item">
        <div class="ei-left">
          <div class="ei-cat">${e.category}</div>
          <div class="ei-note">${e.note || '\u2014'}</div>
        </div>
        <div style="text-align:right">
          <div class="ei-amount">\u20ac${e.amount.toFixed(2)}</div>
          <div class="ei-hkd">HK$${(e.amount * rate).toFixed(0)}</div>
        </div>
        <button class="expense-delete" onclick="event.stopPropagation();deleteExpense(${e.id})">\u00d7</button>
      </div>`;
    });
  });

  document.getElementById('expenseList').innerHTML = listHtml;
  document.getElementById('exportBtn').style.display = expenses.length > 0 ? 'block' : 'none';
}

function exportCSV() {
  const expenses = getExpenses();
  const rate = getRate();
  let csv = 'Date,Day,Category,Note,EUR,HKD\n';
  expenses.forEach(e => {
    const dayData = DAYS.find(d => d.date === e.day);
    csv += `${e.day},${dayData ? dayData.label : ''},${e.category},"${(e.note||'').replace(/"/g,'""')}",${e.amount.toFixed(2)},${(e.amount*rate).toFixed(2)}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'italy_2026_expenses.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function convertEur() {
  const v = parseFloat(document.getElementById('convEur').value);
  const rate = parseFloat(document.getElementById('convRate').value) || DEFAULT_RATE;
  document.getElementById('convHkd').value = v ? (v * rate).toFixed(2) : '';
}

function convertHkd() {
  const v = parseFloat(document.getElementById('convHkd').value);
  const rate = parseFloat(document.getElementById('convRate').value) || DEFAULT_RATE;
  document.getElementById('convEur').value = v ? (v / rate).toFixed(2) : '';
}

function quickConvert(eur) {
  document.getElementById('convEur').value = eur;
  convertEur();
}

// ============================================================
// CHECKLIST
// ============================================================
function getCheckedItems() {
  try { return JSON.parse(localStorage.getItem('italy_checklist') || '{}'); }
  catch { return {}; }
}

function renderChecklist() {
  const container = document.getElementById('checklist');
  const checked = getCheckedItems();
  let total = 0, done = 0;
  let html = '';

  Object.entries(PACKING).forEach(([group, items]) => {
    html += `<div class="checklist-group"><div class="checklist-group-title">${group}</div>`;
    items.forEach(item => {
      const key = group + ':' + item;
      const isDone = !!checked[key];
      total++;
      if (isDone) done++;
      html += `<div class="check-item${isDone ? ' done' : ''}" onclick="toggleCheck('${key.replace(/'/g, "\\'")}')">
        <div class="check-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        <span class="check-label">${item}</span>
      </div>`;
    });
    html += '</div>';
  });

  container.innerHTML = html;
  document.getElementById('checkProgress').textContent = `${done} / ${total} packed`;
}

function toggleCheck(key) {
  const checked = getCheckedItems();
  checked[key] = !checked[key];
  localStorage.setItem('italy_checklist', JSON.stringify(checked));
  renderChecklist();
}

function init() {
  // Load saved rate
  const savedRate = localStorage.getItem('italy_rate');
  if (savedRate) document.getElementById('convRate').value = savedRate;

  updateHeader();
  setInterval(updateHeader, 30000);

  renderToday();
  setInterval(renderToday, 60000); // Refresh every minute

  const todayIdx = getTripDayIndex();

  renderDayContent();

  renderBookings();
  renderCultureTips();
  renderAmenities();
  renderPhrasebook();
  renderChecklist();
  renderEmergency();
  renderExpenses();

  // Show Today panel
  switchTab('panelToday', document.querySelector('[data-tab="panelToday"]'));
}
